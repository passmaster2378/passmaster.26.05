<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PASSmaster | 이메일 인증</title>
    <link rel="stylesheet" href="./assets/shared.css" />
    <script defer src="./assets/shared.js"></script>
  </head>
  <body>
    <div class="pm-shell">
      <header class="pm-header">
        <a class="pm-logo" href="./index.html">PASSmaster</a>
        <nav class="pm-nav" aria-label="공통 이동">
          <a href="./login.html">로그인</a>
          <a href="./register.html">회원가입</a>
          <a href="./enroll/index.html">수강신청</a>
          <a href="./my-courses/index.html">내 강의</a>
          <a href="./pages.html">전체 페이지</a>
        </nav>
      </header>

      <main class="pm-main">
        <p class="pm-pill">Public Flow</p>
        <h1>이메일 인증</h1>
        <p class="pm-summary">가입 후 인증 여부를 확인하고 온보딩 단계로 이동합니다.</p>
        <div class="pm-cta-row">
          <a class="pm-btn pm-btn-ghost" href="./register.html">이전 단계</a>
          <a class="pm-btn pm-btn-primary" href="./onboarding.html">다음 단계</a>
        </div>

        <section class="pm-card">
          <h2>인증 상태 확인</h2>
          <p class="auth-message info" data-email-verify-msg>인증 정보를 확인하는 중입니다.</p>
          <div class="pm-link-list" style="display:grid; gap:10px; list-style:none; padding:0; margin:0;">
            <label>
              인증 대상 이메일
              <input
                type="email"
                data-email-verify-input
                placeholder="name@example.com"
                style="width:100%; min-height:38px; border:1px solid #d8e1f4; border-radius:10px; padding:0 10px; margin-top:6px;"
              />
            </label>
            <div style="display:flex; gap:8px; flex-wrap:wrap;">
              <button class="pm-btn pm-btn-primary" type="button" data-email-verify-confirm>인증 완료 처리</button>
              <a class="pm-btn pm-btn-ghost" href="./login.html">로그인으로 이동</a>
            </div>
          </div>
        </section>

        <section class="pm-card">
          <h2>현재 경로</h2>
          <p class="pm-route">/verify-email</p>
        </section>

        <section class="pm-card">
          <h2>연결 페이지</h2>
          <ul class="pm-link-list">
          <li><a href="./login.html">/login</a></li>
          <li><a href="./forgot-password.html">/forgot-password</a></li>
          </ul>
        </section>
      </main>

      <footer class="pm-footer">
        <a href="./index.html">메인으로</a>
        <a href="./support/index.html">고객센터</a>
        <a href="./pages.html">사이트맵</a>
      </footer>
    </div>
    <script>
      (function () {
        const msg = document.querySelector("[data-email-verify-msg]");
        const input = document.querySelector("[data-email-verify-input]");
        const confirmBtn = document.querySelector("[data-email-verify-confirm]");
        if (!msg || !input || !confirmBtn) return;

        const params = new URLSearchParams(window.location.search);
        const emailFromQuery = String(params.get("email") || "").trim();
        let emailFromSession = "";
        try {
          const raw = localStorage.getItem("passmaster_auth");
          const session = raw ? JSON.parse(raw) : null;
          emailFromSession = session && session.user && session.user.email ? String(session.user.email) : "";
        } catch (_error) {
          emailFromSession = "";
        }
        input.value = emailFromQuery || emailFromSession;
        msg.textContent = "이메일 인증 확인 후 온보딩으로 이동하세요.";

        confirmBtn.addEventListener("click", () => {
          const email = String(input.value || "").trim().toLowerCase();
          if (!email || !email.includes("@")) {
            msg.textContent = "유효한 이메일을 입력해 주세요.";
            msg.className = "auth-message error";
            return;
          }
          try {
            localStorage.setItem(
              "passmaster_email_verification",
              JSON.stringify({
                email,
                verified: true,
                verifiedAt: new Date().toISOString(),
              })
            );
          } catch (_error) {
            // ignore storage failures
          }
          msg.textContent = "인증 확인이 완료되었습니다. 온보딩으로 이동합니다.";
          msg.className = "auth-message success";
          setTimeout(() => {
            window.location.href = `./onboarding.html?email=${encodeURIComponent(email)}`;
          }, 500);
        });
      })();
    </script>
  </body>
</html>
