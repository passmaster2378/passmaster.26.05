    <link rel="stylesheet" href="../assets/shared.css" />
    <style>
      #cert-sections {
        display: grid;
        gap: 0;
      }
      .cert-info-gallery {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin: 0 0 20px;
      }
      @media (max-width: 760px) {
        .cert-info-gallery {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      .cert-info-gallery figure {
        margin: 0;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid #e8ecf3;
        background: #f6f8fc;
      }
      .cert-info-gallery img {
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        display: block;
      }
      .cert-info-gallery figcaption {
        padding: 8px 10px 10px;
        font-size: 13px;
        line-height: 1.35;
        color: #394960;
      }
      .cert-exam-spec {
        margin: 0 0 18px;
        padding: 0;
        border: 1px solid #dfe7f5;
        border-radius: 12px;
        overflow: hidden;
        background: #fbfcff;
      }
      .cert-exam-spec > div + div > h3 {
        border-radius: 0;
        border-top: 1px solid #dfe7f5;
      }
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 800;
        color: #1c2f4a;
        background: linear-gradient(180deg, #eef3fc 0%, #e7eef9 100%);
        border-bottom: 1px solid #dfe7f5;
      }
      .cert-exam-spec ul {
        margin: 0;
        padding: 12px 16px 12px 32px;
        font-size: 14px;
        line-height: 1.55;
        color: #2c405c;
      }
      .cert-exam-spec-passing {
        margin: 12px 16px 16px;
        padding: 10px 12px;
        border-radius: 10px;
        background: #fff;
        border: 1px solid #dfe7f5;
        font-size: 14px;
        line-height: 1.55;
        font-weight: 700;
        color: #173b6f;
      }
      .cert-exam-spec-foot {
        padding: 0 16px 14px;
        font-size: 13px;
        line-height: 1.55;
        color: #5a718f;
      }
      .pm-official-note {
        margin: 0 0 16px;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #d8e5fc;
        background: #f4f8ff;
        color: #315892;
        font-size: 14px;
        line-height: 1.55;
      }
      .pm-official-note a {
        color: #0f49c2;
        font-weight: 800;
        text-decoration: underline;
      }
    </style>

      function appendExamSpecBlock(sectionEl, exam) {
        const box = document.createElement("div");
        box.className = "cert-exam-spec";

        const mkPart = (title, lines) => {
          const seg = document.createElement("div");
          const h3 = document.createElement("h3");
          h3.textContent = title;
          seg.appendChild(h3);
          const ul = document.createElement("ul");
          for (const line of lines) {
            if (!String(line).trim()) continue;
            const li = document.createElement("li");
            li.textContent = line;
            ul.appendChild(li);
          }
          seg.appendChild(ul);
          return seg;
        };

        box.appendChild(mkPart("필기시험 과목", exam.written));
        box.appendChild(mkPart("실기시험 과목 · 과제", exam.practical));
        const passing = document.createElement("div");
        passing.className = "cert-exam-spec-passing";
        passing.textContent = `합격 기준 안내 · ${exam.passing}`;
        box.appendChild(passing);
        if (exam.footnote) {
          const ft = document.createElement("p");
          ft.className = "cert-exam-spec-foot";
          ft.textContent = exam.footnote;
          box.appendChild(ft);
        }

        const anchor = sectionEl.querySelector("h2");
        if (anchor?.nextSibling) sectionEl.insertBefore(box, anchor.nextSibling);
        else sectionEl.appendChild(box);
      }

            for (const item of imgs) {
              const figure = document.createElement("figure");
              const img = document.createElement("img");
              img.loading = "lazy";
              img.src = item.src;
              img.alt = item.caption;
              img.decoding = "async";
              const cap = document.createElement("figcaption");
              cap.textContent = item.caption;
              figure.appendChild(img);
              figure.appendChild(cap);
              galleryEl.appendChild(figure);
            }
          } else galleryEl.hidden = true;
        }

        for (const sec of data.sections) {
          const card = document.createElement("section");
          card.className = "pm-card";
          const h2 = document.createElement("h2");
          h2.textContent = sec.title;
          card.appendChild(h2);
          if (examSpec && sec.title === "시험·응시 안내") appendExamSpecBlock(card, examSpec);
          for (const line of sec.paras) {
            const p = document.createElement("p");
            p.className = "pm-detail";
            p.textContent = line;
            card.appendChild(p);
          }
          sectionsEl.appendChild(card);
        }
      }
    </script>
  </body>
</html>
