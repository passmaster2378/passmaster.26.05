    <style>
      #cert-sections {
        display: grid;
        gap: 0;
      }
      .cert-info-gallery {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 12px;
        margin: 0 0 20px;
      }
      @media (max-width: 760px) {
        .cert-info-gallery {
          grid-template-columns: repeat(2, minmax(0, 1fr));
        }
      }
      .cert-info-gallery figure {
        margin: 0;
        border-radius: 14px;
        overflow: hidden;
        border: 1px solid #e8ecf3;
        background: #f6f8fc;
      }
      .cert-info-gallery img {
        width: 100%;
        aspect-ratio: 4 / 3;
        object-fit: cover;
        display: block;
      }
      .cert-info-gallery figcaption {
        padding: 8px 10px 10px;
        font-size: 13px;
        line-height: 1.35;
        color: #394960;
      }
      .cert-exam-spec {
        margin: 0 0 18px;
        padding: 0;
        border: 1px solid #dfe7f5;
        border-radius: 12px;
        overflow: hidden;
        background: #fbfcff;
      }
      .cert-exam-spec > div > h3 {
        margin: 0;
        padding: 10px 14px;
        font-size: 14px;
        font-weight: 800;
        color: #1c2f4a;
        background: linear-gradient(180deg, #eef3fc 0%, #e7eef9 100%);
        border-bottom: 1px solid #dfe7f5;
      }
      .cert-exam-spec > div + div > h3 {
        border-radius: 0;
        border-top: 1px solid #dfe7f5;
      }
      .cert-exam-spec ul {
        margin: 0;
        padding: 12px 16px 12px 32px;
        font-size: 14px;
        line-height: 1.55;
        color: #2c405c;
      }
      .cert-exam-spec-passing {
        margin: 12px 16px 16px;
        padding: 10px 12px;
        border-radius: 10px;
        background: #fff;
        border: 1px solid #dfe7f5;
        font-size: 14px;
        line-height: 1.55;
        font-weight: 700;
        color: #173b6f;
      }
      .cert-exam-spec-foot {
        padding: 0 16px 14px;
        font-size: 13px;
        line-height: 1.55;
        color: #5a718f;
      }
      .pm-official-note {
        margin: 0 0 16px;
        padding: 12px 14px;
        border-radius: 12px;
        border: 1px solid #d8e5fc;
        background: #f4f8ff;
        color: #315892;
        font-size: 14px;
        line-height: 1.55;
      }
      .pm-official-note a {
        color: #0f49c2;
        font-weight: 800;
        text-decoration: underline;
      }
      .cert-qnet-in-section {
        margin-top: 14px;
        padding-top: 12px;
        border-top: 1px solid #e4ebf5;
      }
      .cert-qnet-in-section a {
        color: #0f49c2;
        font-weight: 800;
        text-decoration: underline;
      }
    </style>

      function appendExamSpecBlock(sectionEl, exam) {
        const box = document.createElement("div");
        box.className = "cert-exam-spec";

        const mkPart = (title, lines) => {
          const seg = document.createElement("div");
          const h3 = document.createElement("h3");
          h3.textContent = title;
          seg.appendChild(h3);
          const ul = document.createElement("ul");
          for (const line of lines) {
            if (!String(line).trim()) continue;
            const li = document.createElement("li");
            li.textContent = line;
            ul.appendChild(li);
          }
          seg.appendChild(ul);
          return seg;
        };

        box.appendChild(mkPart("필기시험 과목", exam.written));
        box.appendChild(mkPart("실기시험 과목 · 과제", exam.practical));
        const passing = document.createElement("div");
        passing.className = "cert-exam-spec-passing";
        passing.textContent = `합격 기준 안내 · ${exam.passing}`;
        box.appendChild(passing);
        if (exam.footnote) {
          const ft = document.createElement("p");
          ft.className = "cert-exam-spec-foot";
          ft.textContent = exam.footnote;
          box.appendChild(ft);
        }

        const anchor = sectionEl.querySelector("h2");
        if (anchor?.nextSibling) sectionEl.insertBefore(box, anchor.nextSibling);
        else sectionEl.appendChild(box);
      }

      function getCertStoredSession() {
        try {
          const raw = localStorage.getItem("passmaster_auth");
          const s = raw ? JSON.parse(raw) : null;
          return s && s.user && s.token ? s : null;
        } catch (_e) {
          return null;
        }
      }

      function refreshCertAuthChrome() {
        const session = getCertStoredSession();
        document.querySelectorAll("[data-cert-auth-guest]").forEach((el) => {
          el.hidden = Boolean(session);
        });
        document.querySelectorAll("[data-cert-auth-member]").forEach((el) => {
          el.hidden = !session;
        });
        const logout = document.querySelector("[data-cert-logout-btn]");
        if (logout && session && logout.dataset.certLogoutBound !== "1") {
          logout.dataset.certLogoutBound = "1";
          logout.addEventListener("click", (event) => {
            event.preventDefault();
            localStorage.removeItem("passmaster_auth");
            try {
              sessionStorage.removeItem("passmaster_return_to");
            } catch (_err) {
              /* ignore */
            }
            window.location.reload();
          });
        }
      }

            : "../enroll/apply/index.html";

          a.setAttribute("href", href);
        });
      }

      function syncCertTrialLinks(certSlug) {
        const key = String(certSlug || "").trim().toLowerCase();
        const link = document.getElementById("cert-trial-start");
        if (link) {
          const base = "../study/makeup/index.html";
          link.href = key ? `${base}?trialFrom=${encodeURIComponent(key)}` : base;
        }
        const desc = document.getElementById("cert-trial-desc");
        if (!desc) return;
        if (key === "makeup") {
          desc.textContent =
            "로그인 후 학습 현황 로드맵 2단계(첫 학습) 방식으로 최대 약 100문항까지 무료 체험할 수 있습니다. 이후 단계는 수강·승인 후 이용합니다.";
        } else if (key && Object.prototype.hasOwnProperty.call(CERT_GENERAL, key)) {
          desc.textContent =
            "연습 문제은행은 현재 미용사(메이크업) 데모 데이터로 제공되어 UI와 학습 흐름을 확인하는 용도입니다. 본 과정 학습은 수강신청·승인 후 단계별로 진행됩니다.";
        } else {
          desc.textContent =
            "데모 문제은행으로 풀이 환경을 확인할 수 있습니다. 과정별 본 학습은 수강·승인 후 제공됩니다.";
        }
      }
      syncCertInfoEnrollLinks(slug);
      syncCertTrialLinks(slug);

      const data = CERT_GENERAL[slug];

      const titleEl = document.getElementById("cert-title");
      const introEl = document.getElementById("cert-intro");
      const sectionsEl = document.getElementById("cert-sections");
      const officialEl = document.getElementById("cert-official");

      if (!data) {
        document.title = "PASSmaster | 자격증 없음";
        titleEl.textContent = "자격증을 찾을 수 없습니다";
        introEl.textContent = "URL의 slug 값을 확인해 주세요. 예: info.html?slug=forklift";
        officialEl.hidden = true;
        const g = document.getElementById("cert-gallery");
        if (g) g.hidden = true;
        const fallback = document.createElement("section");
        fallback.className = "pm-card";
        const p = document.createElement("p");
        p.className = "pm-detail";
        const a = document.createElement("a");
        a.href = "../index.html#cert-courses";
        a.textContent = "메인 자격증 목록으로 이동";
        p.appendChild(a);
        fallback.appendChild(p);
        sectionsEl.appendChild(fallback);
      } else {
        titleEl.textContent =
          {
            forklift: "지게차기능사",
            excavator: "굴착기기능사",
            electric: "전기기능사",
            welding: "피복아크용접기능사",
            carrepair: "자동차정비기능사",
            beautician: "일반미용사",
            makeup: "메이크업 미용사",
            skin: "피부미용사",
            nail: "네일미용사",
            elevator: "승강기능사",
            cookkr: "한식조리기능사",
            cookwest: "양식조리기능사",
            cookcn: "중식조리기능사",
            cookjp: "일식조리기능사",
            bakery: "제빵기능사",
            confection: "제과기능사",
            landscape: "조경기능사",
            hazmat: "위험물기능사",
            info_proc: "정보처리기능사",
            comp_app: "컴퓨터활용능력",
            word_proc: "워드프로세서",
          }[slug] || slug;
        document.title = `PASSmaster | ${titleEl.textContent} 일반 정보`;
        introEl.textContent = data.intro;

        if (data.official) {
          officialEl.textContent = data.official;
          officialEl.hidden = false;
        } else {
          officialEl.hidden = true;
        }

        const galleryEl = document.getElementById("cert-gallery");
        const examSpec = CERT_EXAM_SPEC[slug];
        if (galleryEl) {
          const imgs = CERT_GALLERY[slug];
          if (imgs && imgs.length === 3) {
            galleryEl.hidden = false;
            galleryEl.innerHTML = "";
            for (const item of imgs) {
              const figure = document.createElement("figure");
              const img = document.createElement("img");
              img.loading = "lazy";
              img.src = item.src;
              img.alt = item.caption;
              img.decoding = "async";
              const cap = document.createElement("figcaption");
              cap.textContent = item.caption;
              figure.appendChild(img);
              figure.appendChild(cap);
              galleryEl.appendChild(figure);
            }
          } else galleryEl.hidden = true;
        }

        for (const sec of data.sections) {
          const card = document.createElement("section");
          card.className = "pm-card";
          const h2 = document.createElement("h2");
          h2.textContent = sec.title;
          card.appendChild(h2);
          if (examSpec && sec.title === "시험·응시 안내") appendExamSpecBlock(card, examSpec);
          for (const line of sec.paras) {
            const p = document.createElement("p");
            p.className = "pm-detail";
            p.textContent = line;
            card.appendChild(p);
          }
          if (sec.title === "시험·응시 안내") {
            const foot = document.createElement("p");
            foot.className = "pm-detail cert-qnet-in-section";
            foot.innerHTML =
              '응시 원서·일정·공고·합격 발표 등 최신 정보는 <a href="https://www.q-net.or.kr/" target="_blank" rel="noopener noreferrer">Q-Net 공식 웹사이트</a>(한국산업인력공단)에서 확인하세요.';
            card.appendChild(foot);
          }
          sectionsEl.appendChild(card);
        }
      }
    </script>
  </body>
</html>
