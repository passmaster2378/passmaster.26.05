<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PASSmaster | 프로필 관리</title>
    <link rel="stylesheet" href="../../assets/shared.css" />
    <script defer src="../../assets/shared.js"></script>
  </head>
  <body>
    <div class="pm-shell">
      <header class="pm-header">
        <a class="pm-logo" href="../../index.html">PASSmaster</a>
        <nav class="pm-nav" aria-label="공통 이동">
          <a href="../../login.html">로그인</a>
          <a href="../../register.html">회원가입</a>
          <a href="../../enroll/index.html">수강신청</a>
          <a href="../../my-courses/index.html">내 강의</a>
          <a href="../../pages.html">전체 페이지</a>
        </nav>
      </header>

      <main class="pm-main">
        <p class="pm-pill">User Flow</p>
        <h1>프로필 관리</h1>
        <p class="pm-summary">계정에 등록된 이름·이메일·연락처와 가입일을 확인합니다.</p>

        <section class="pm-card" data-api="profile-summary-root">
          <h2>내 정보</h2>
          <p class="auth-message info" data-api="profile-summary-message">불러오는 중…</p>
          <ul class="pm-link-list" style="list-style: none; padding: 0; line-height: 1.85">
            <li><strong>이름:</strong> <span data-field="name">-</span></li>
            <li><strong>이메일:</strong> <span data-field="email">-</span></li>
            <li><strong>휴대전화:</strong> <span data-field="phone">-</span></li>
            <li><strong>가입일:</strong> <span data-field="joined">-</span></li>
          </ul>
          <p class="pm-detail" style="margin-top: 14px">
            이메일·이름 정정 등은 고객센터 <a href="../../support/inquiry/new/index.html">1:1 문의</a>로 요청해 주세요. 비밀번호는
            <a href="../password/index.html">비밀번호 변경</a>에서 직접 바꿀 수 있습니다.
          </p>
        </section>

        <section class="pm-card">
          <h2>현재 경로</h2>
          <p class="pm-route">/mypage/profile</p>
        </section>

        <div class="pm-cta-row" aria-label="페이지 이동">
          <a class="pm-btn pm-btn-ghost" href="../index.html">마이페이지</a>
          <a class="pm-btn pm-btn-primary" href="../password/index.html">비밀번호 변경</a>
        </div>
      </main>

      <footer class="pm-footer">
        <a href="../../index.html">메인으로</a>
        <a href="../../support/index.html">고객센터</a>
        <a href="../../pages.html">사이트맵</a>
      </footer>
    </div>
    <script defer src="../../assets/auth-client.js?v=20260210-profile"></script>
  </body>
</html>
