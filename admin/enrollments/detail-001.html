<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PASSmaster | 신청 상세 관리</title>
    <link rel="stylesheet" href="../../assets/shared.css" />
    <script defer src="../../assets/shared.js"></script>
  </head>
  <body>
    <div class="pm-shell">
      <header class="pm-header">
        <a class="pm-logo" href="../../index.html">PASSmaster</a>
        <nav class="pm-nav" aria-label="공통 이동">
          <a href="../../login.html">로그인</a>
          <a href="../../register.html">회원가입</a>
          <a href="../../enroll/index.html">수강신청</a>
          <a href="../../my-courses/index.html">내 강의</a>
          <a href="../index.html">관리자</a>
          <a href="../../pages.html">전체 페이지</a>
        </nav>
      </header>

      <main class="pm-main">
        <p class="pm-pill">Admin Flow</p>
        <h1>신청 상세 관리</h1>
        <p class="pm-summary">신청자 정보, 첨부 자료, 처리 로그를 상세히 확인합니다.</p>
        <div class="pm-cta-row">
          <a class="pm-btn pm-btn-ghost" href="./index.html">이전 단계</a>
          <a class="pm-btn pm-btn-primary" href="../payments/index.html">다음 단계</a>
        </div>

        <section class="pm-card" data-api="admin-enrollment-detail">
          <h2>신청 상세 (API)</h2>
          <p class="auth-message info" data-api="admin-enrollment-error"></p>
          <ul class="pm-link-list" style="list-style: none; padding: 0">
            <li><strong>ID:</strong> <span data-field="id">-</span></li>
            <li><strong>회원:</strong> <span data-field="user">-</span></li>
            <li><strong>과정:</strong> <span data-field="course">-</span></li>
            <li><strong>결제:</strong> <span data-field="payment">-</span></li>
            <li><strong>승인:</strong> <span data-field="approval">-</span></li>
          </ul>
          <form class="pm-form" data-api="admin-enrollment-patch">
            <h3>상태 변경</h3>
            <label>
              결제 상태
              <select name="payment_status">
                <option value="">변경 없음</option>
                <option value="pending">결제대기</option>
                <option value="deposit_submitted">입금요청</option>
                <option value="paid">결제완료</option>
              </select>
            </label>
            <label>
              승인
              <select name="approval_status">
                <option value="">변경 없음</option>
                <option value="pending">승인대기</option>
                <option value="approved">승인완료</option>
                <option value="rejected">반려</option>
              </select>
            </label>
            <label>
              학습
              <select name="learning_status">
                <option value="">변경 없음</option>
                <option value="not_started">학습전</option>
                <option value="in_progress">학습중</option>
                <option value="completed">학습완료</option>
              </select>
            </label>
            <p class="auth-message info" data-api="admin-enrollment-form-msg"></p>
            <button class="pm-btn pm-btn-primary" type="submit">저장</button>
          </form>
        </section>

        <section class="pm-card">
          <h2>현재 경로</h2>
          <p class="pm-route">/admin/enrollments/[id]</p>
        </section>

        <section class="pm-card">
          <h2>연결 페이지</h2>
          <ul class="pm-link-list">
          <li><a href="../users/detail-001.html">/admin/users/[id]</a></li>
          </ul>
        </section>
      </main>

      <footer class="pm-footer">
        <a href="../../index.html">메인으로</a>
        <a href="../../support/index.html">고객센터</a>
        <a href="../../pages.html">사이트맵</a>
      </footer>
    </div>
    <script defer src="../../assets/auth-client.js"></script>
  </body>
</html>
