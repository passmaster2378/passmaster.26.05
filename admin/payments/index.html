<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PASSmaster | 결제 관리</title>
    <link rel="stylesheet" href="../../assets/shared.css" />
    <script defer src="../../assets/shared.js"></script>
    <style>
      .pm-toolbar {
        display: grid;
        grid-template-columns: 1fr 180px 140px;
        gap: 8px;
        margin-bottom: 10px;
      }
      .pm-toolbar input,
      .pm-toolbar select {
        border: 1px solid #d2dae8;
        border-radius: 10px;
        min-height: 40px;
        padding: 0 10px;
      }
      .pm-stats {
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 10px;
      }
      .pm-stat {
        border: 1px solid #dce3ef;
        border-radius: 10px;
        background: #fff;
        padding: 9px 10px;
        font-size: 12px;
      }
      .pm-stat strong {
        display: block;
        margin-top: 2px;
        font-size: 16px;
      }
      .pm-payment-row--awaiting {
        background: #fff9e6;
      }
      .pm-payment-row--completed {
        background: #eefaf0;
      }
      @media (max-width: 900px) {
        .pm-toolbar,
        .pm-stats {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="pm-shell">
      <header class="pm-header">
        <a class="pm-logo" href="../../index.html">PASSmaster</a>
        <nav class="pm-nav" aria-label="공통 이동">
          <a href="../../login.html">로그인</a>
          <a href="../../register.html">회원가입</a>
          <a href="../../enroll/index.html">수강신청</a>
          <a href="../../my-courses/index.html">내 강의</a>
          <a href="../index.html">관리자</a>
          <a href="../../pages.html">전체 페이지</a>
        </nav>
      </header>

      <main class="pm-main">
        <p class="pm-pill">Admin Flow</p>
        <h1>결제 관리</h1>
        <p class="pm-summary">결제 승인 상태, 실패 내역, 환불 요청을 통합 관리합니다.</p>

        <section class="pm-card">
          <h2>결제 목록 (API)</h2>
          <div class="pm-toolbar">
            <input id="admin-payments-search" type="search" placeholder="회원/과정/신청번호 검색" />
            <select id="admin-payments-status-filter">
              <option value="">전체 상태</option>
              <option value="awaiting_confirmation">입금확인대기</option>
              <option value="completed">확인완료</option>
              <option value="pending">결제대기</option>
              <option value="failed">확인실패</option>
              <option value="refunded">환불완료</option>
            </select>
            <button class="pm-btn pm-btn-primary" type="button" id="admin-payments-refresh">새로고침</button>
          </div>
          <div class="pm-stats">
            <div class="pm-stat">전체 건수<strong id="admin-payments-total">0</strong></div>
            <div class="pm-stat">입금확인대기<strong id="admin-payments-awaiting">0</strong></div>
            <div class="pm-stat">확인완료<strong id="admin-payments-completed">0</strong></div>
            <div class="pm-stat">표시중<strong id="admin-payments-visible">0</strong></div>
          </div>
          <div class="pm-table-wrap">
            <table class="pm-table">
              <thead>
                <tr>
                  <th>신청 ID</th>
                  <th>회원</th>
                  <th>과정</th>
                  <th>금액</th>
                  <th>상태</th>
                  <th></th>
                </tr>
              </thead>
              <tbody data-api="admin-payments-body"></tbody>
            </table>
          </div>
        </section>

        <div class="pm-cta-row pm-flow-nav-before-route" aria-label="페이지 이동">
          <a class="pm-btn pm-btn-ghost" href="./index.html">목록</a>
          <a class="pm-btn pm-btn-ghost" href="../enrollments/detail-001.html">이전 단계</a>
          <a class="pm-btn pm-btn-primary" href="./detail-001.html?id=1">샘플 상세</a>
        </div>
        <section class="pm-card">
          <h2>현재 경로</h2>
          <p class="pm-route">/admin/payments</p>
        </section>

        <section class="pm-card">
          <h2>연결 페이지</h2>
          <ul class="pm-link-list">
          <li><a href="../inquiries/index.html">/admin/inquiries</a></li>
          </ul>
        </section>
      </main>

      <footer class="pm-footer">
        <a href="../../index.html">메인으로</a>
        <a href="../../support/index.html">고객센터</a>
        <a href="../../pages.html">사이트맵</a>
      </footer>
    </div>
    <script defer src="../../assets/auth-client.js"></script>
  </body>
</html>
