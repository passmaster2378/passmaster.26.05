<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PASSmaster | 후기 검수 센터</title>
    <link rel="stylesheet" href="../../assets/shared.css" />
    <script defer src="../../assets/shared.js"></script>
    <style>
      .grid {
        display: grid;
        gap: 12px;
      }
      .toolbar {
        display: grid;
        grid-template-columns: 1fr 180px 140px;
        gap: 8px;
      }
      .toolbar input,
      .toolbar select {
        border: 1px solid #d3dae6;
        border-radius: 10px;
        min-height: 40px;
        padding: 0 10px;
      }
      .review-item {
        border: 1px solid #dde4ef;
        border-radius: 12px;
        padding: 12px;
        background: #fff;
      }
      .review-head {
        display: flex;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 6px;
      }
      .pill {
        display: inline-flex;
        align-items: center;
        border-radius: 999px;
        padding: 2px 8px;
        font-size: 12px;
        font-weight: 700;
      }
      .pill.pending {
        background: #fff4e5;
        color: #8a3b12;
      }
      .pill.approved {
        background: #e8f5e9;
        color: #1c5a20;
      }
      .pill.hidden,
      .pill.rejected {
        background: #fdecec;
        color: #9f1f1f;
      }
      .actions {
        display: flex;
        gap: 6px;
        flex-wrap: wrap;
        margin-top: 8px;
      }
      .btn-mini {
        border: 1px solid #c8d4ea;
        border-radius: 8px;
        background: #fff;
        min-height: 32px;
        padding: 0 10px;
        font-size: 12px;
        font-weight: 700;
        color: #2f4f80;
        cursor: pointer;
      }
      .note {
        width: 100%;
        border: 1px solid #d3dae6;
        border-radius: 8px;
        min-height: 38px;
        padding: 8px;
        box-sizing: border-box;
        margin-top: 8px;
      }
      @media (max-width: 820px) {
        .toolbar {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="pm-shell">
      <header class="pm-header">
        <a class="pm-logo" href="../../index.html">PASSmaster</a>
        <nav class="pm-nav" aria-label="공통 이동">
          <a href="../../login.html">로그인</a>
          <a href="../../register.html">회원가입</a>
          <a href="../../enroll/index.html">수강신청</a>
          <a href="../../my-courses/index.html">내 강의</a>
          <a href="../index.html">관리자</a>
          <a href="../../pages.html">전체 페이지</a>
        </nav>
      </header>
      <main class="pm-main">
        <p class="pm-pill">Admin Flow</p>
        <h1>후기 검수 센터</h1>
        <p class="pm-summary">수강생 후기의 승인/숨김/반려를 처리하고 메모를 남깁니다.</p>
        <section class="pm-card grid">
          <div class="toolbar">
            <input id="filter-q" type="search" placeholder="작성자/내용 검색" />
            <select id="filter-status">
              <option value="">전체 상태</option>
              <option value="pending">검수중</option>
              <option value="approved">승인</option>
              <option value="hidden">숨김</option>
              <option value="rejected">반려</option>
            </select>
            <button class="pm-btn pm-btn-primary" id="btn-refresh">새로고침</button>
          </div>
          <div id="reviews-list"></div>
        </section>
      </main>
      <footer class="pm-footer">
        <a href="../../index.html">메인으로</a>
        <a href="../index.html">관리자 대시보드</a>
        <a href="../../support/index.html">고객센터</a>
      </footer>
    </div>
    <script>
      const statusLabel = {
        pending: "검수중",
        approved: "승인",
        hidden: "숨김",
        rejected: "반려",
      };

      function getSession() {
        try {
          const raw = localStorage.getItem("passmaster_auth");
          return raw ? JSON.parse(raw) : null;
        } catch (_error) {
          return null;
        }
      }

      async function requestApi(path, options = {}) {
        const session = getSession();
        if (!session || !session.token) throw new Error("로그인이 필요합니다.");
        const res = await fetch(`/api${path}`, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${session.token}`,
            ...(options.headers || {}),
          },
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.message || "요청 처리 실패");
        return data;
      }

      let rows = [];
      function escapeHtml(value) {
        const div = document.createElement("div");
        div.textContent = value;
        return div.innerHTML;
      }

      function render() {
        const q = document.getElementById("filter-q").value.trim().toLowerCase();
        const s = document.getElementById("filter-status").value;
        const list = document.getElementById("reviews-list");
        const filtered = rows.filter((r) => {
          const text = `${r.author_name || ""} ${r.content || ""}`.toLowerCase();
          const qMatch = !q || text.includes(q);
          const sMatch = !s || String(r.status || "") === s;
          return qMatch && sMatch;
        });
        if (!filtered.length) {
          list.innerHTML = "<p style='color:#6b7280;margin:0'>표시할 후기가 없습니다.</p>";
          return;
        }
        list.innerHTML = filtered
          .map(
            (r) => `
            <article class="review-item">
              <div class="review-head">
                <div><strong>${escapeHtml(r.author_name || "-")}</strong> · ${escapeHtml(String(r.score || "-"))}점</div>
                <span class="pill ${escapeHtml(String(r.status || "pending"))}">${escapeHtml(statusLabel[r.status] || "검수중")}</span>
              </div>
              <p style="margin:0 0 6px;line-height:1.5">${escapeHtml(r.content || "")}</p>
              <p style="margin:0;color:#6b7280;font-size:12px">ID ${r.id} · ${escapeHtml(r.user_email || "-")} · ${escapeHtml(r.created_at || "-")}</p>
              <textarea class="note" data-note-id="${r.id}" placeholder="관리자 메모">${escapeHtml(
                r.moderation_note || ""
              )}</textarea>
              <div class="actions">
                <button class="btn-mini" data-action="approved" data-id="${r.id}">승인</button>
                <button class="btn-mini" data-action="hidden" data-id="${r.id}">숨김</button>
                <button class="btn-mini" data-action="rejected" data-id="${r.id}">반려</button>
              </div>
            </article>
          `
          )
          .join("");
        list.querySelectorAll("[data-action]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const id = Number(btn.getAttribute("data-id"));
            const status = btn.getAttribute("data-action");
            const noteEl = document.querySelector(`[data-note-id="${id}"]`);
            const moderationNote = noteEl ? noteEl.value.trim() : "";
            try {
              await requestApi(`/admin/reviews/${id}`, {
                method: "PATCH",
                body: JSON.stringify({ status, moderationNote }),
              });
              await load();
            } catch (error) {
              alert(error.message || "업데이트에 실패했습니다.");
            }
          });
        });
      }

      async function load() {
        try {
          rows = await requestApi("/admin/reviews");
          render();
        } catch (error) {
          document.getElementById("reviews-list").innerHTML = `<p style="color:#b42318;margin:0">${error.message}</p>`;
        }
      }

      document.getElementById("filter-q").addEventListener("input", render);
      document.getElementById("filter-status").addEventListener("change", render);
      document.getElementById("btn-refresh").addEventListener("click", load);
      load();
    </script>
  </body>
</html>
