<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PASSmaster | 온보딩</title>
    <link rel="stylesheet" href="./assets/shared.css" />
    <script defer src="./assets/shared.js"></script>
  </head>
  <body>
    <div class="pm-shell">
      <header class="pm-header">
        <a class="pm-logo" href="./index.html">PASSmaster</a>
        <nav class="pm-nav" aria-label="공통 이동">
          <a href="./login.html">로그인</a>
          <a href="./register.html">회원가입</a>
          <a href="./enroll/index.html">수강신청</a>
          <a href="./my-courses/index.html">내 강의</a>
          <a href="./admin/index.html">관리자</a>
          <a href="./pages.html">전체 페이지</a>
        </nav>
      </header>

      <main class="pm-main">
        <p class="pm-pill">Public Flow</p>
        <h1>온보딩</h1>
        <p class="pm-summary">관심 자격증과 학습 목표를 선택하여 맞춤 과정을 추천받습니다.</p>
        <div class="pm-cta-row">
          <a class="pm-btn pm-btn-ghost" href="./verify-email.html">이전 단계</a>
          <a class="pm-btn pm-btn-primary" href="./enroll/index.html">다음 단계</a>
        </div>

        <section class="pm-card">
          <h2>온보딩 입력</h2>
          <p class="auth-message info" data-onboarding-msg>학습 진단 정보를 입력해 주세요.</p>
          <form data-onboarding-form style="display:grid; gap:10px;">
            <label>
              관심 자격증
              <select name="certSlug" style="width:100%; min-height:38px; border:1px solid #d8e1f4; border-radius:10px; padding:0 10px; margin-top:6px;">
                <option value="makeup">메이크업 미용사</option>
                <option value="beautician">미용사 일반</option>
                <option value="skin">피부미용</option>
                <option value="nail">네일미용</option>
              </select>
            </label>
            <label>
              목표 시험일
              <input name="examDate" type="date" style="width:100%; min-height:38px; border:1px solid #d8e1f4; border-radius:10px; padding:0 10px; margin-top:6px;" />
            </label>
            <label>
              주당 학습 시간
              <select name="weeklyHours" style="width:100%; min-height:38px; border:1px solid #d8e1f4; border-radius:10px; padding:0 10px; margin-top:6px;">
                <option value="4">4시간</option>
                <option value="8">8시간</option>
                <option value="12">12시간</option>
                <option value="16">16시간 이상</option>
              </select>
            </label>
            <label>
              현재 수준
              <select name="level" style="width:100%; min-height:38px; border:1px solid #d8e1f4; border-radius:10px; padding:0 10px; margin-top:6px;">
                <option value="beginner">입문</option>
                <option value="intermediate">중급</option>
                <option value="advanced">상급</option>
              </select>
            </label>
            <button class="pm-btn pm-btn-primary" type="submit">온보딩 저장</button>
          </form>
        </section>

        <section class="pm-card">
          <h2>현재 경로</h2>
          <p class="pm-route">/onboarding</p>
        </section>

        <section class="pm-card">
          <h2>연결 페이지</h2>
          <ul class="pm-link-list">
          <li><a href="./my-courses/index.html">/my-courses</a></li>
          <li><a href="./support/index.html">/support</a></li>
          </ul>
        </section>
      </main>

      <footer class="pm-footer">
        <a href="./index.html">메인으로</a>
        <a href="./support/index.html">고객센터</a>
        <a href="./pages.html">사이트맵</a>
      </footer>
    </div>
    <script>
      (function () {
        const msg = document.querySelector("[data-onboarding-msg]");
        const form = document.querySelector("[data-onboarding-form]");
        if (!msg || !form) return;

        const params = new URLSearchParams(window.location.search);
        const emailFromQuery = String(params.get("email") || "").trim().toLowerCase();
        let email = emailFromQuery;
        if (!email) {
          try {
            const raw = localStorage.getItem("passmaster_email_verification");
            const verification = raw ? JSON.parse(raw) : null;
            email = verification && verification.email ? String(verification.email).toLowerCase() : "";
          } catch (_error) {
            email = "";
          }
        }

        form.addEventListener("submit", (event) => {
          event.preventDefault();
          const certSlug = String(form.certSlug.value || "").trim();
          const examDate = String(form.examDate.value || "").trim();
          const weeklyHours = Number(form.weeklyHours.value || 0);
          const level = String(form.level.value || "").trim();
          const payload = {
            email: email || null,
            certSlug,
            examDate: examDate || null,
            weeklyHours: Number.isFinite(weeklyHours) && weeklyHours > 0 ? weeklyHours : null,
            level: level || null,
            updatedAt: new Date().toISOString(),
          };
          try {
            localStorage.setItem("passmaster_onboarding", JSON.stringify(payload));
          } catch (_error) {
            // ignore storage failures
          }
          msg.textContent = "온보딩이 저장되었습니다. 수강신청 단계로 이동합니다.";
          msg.className = "auth-message success";
          setTimeout(() => {
            window.location.href = "./enroll/index.html";
          }, 500);
        });
      })();
    </script>
  </body>
</html>
