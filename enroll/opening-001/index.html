<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta http-equiv="refresh" content="0; url=../opening/index.html" />
    <title>이동 중…</title>
    <script>
      (function () {
        var q = new URLSearchParams(window.location.search);
        var id = q.get("openingId");
        if (!id) {
          var m = window.location.pathname.match(/opening-(\d+)/i);
          id = m ? m[1] : "1";
        }
        var target = "../opening/index.html?openingId=" + encodeURIComponent(id);
        location.replace(target);
      })();
    </script>
  </head>
  <body>
    <p><a href="../opening/index.html?openingId=1">새 주소로 이동</a></p>

      <a href="../index.html">수강신청</a> ·
      <a href="../../support/index.html">고객센터</a>
    </footer>
  </body>
</html>
