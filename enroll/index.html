<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PASSmaster | 수강 신청</title>
    <link rel="stylesheet" href="../assets/shared.css" />
    <script defer src="../assets/shared.js"></script>
  </head>
  <body>
    <div class="pm-shell">
      <header class="pm-header">
        <a class="pm-logo" href="../index.html">PASSmaster</a>
        <nav class="pm-nav" aria-label="공통 이동">
          <a href="../login.html">로그인</a>
          <a href="../register.html">회원가입</a>
          <a href="./index.html">수강신청</a>
          <a href="../my-courses/index.html">내 강의</a>
          <a href="../admin/index.html">관리자</a>
          <a href="../pages.html">전체 페이지</a>
        </nav>
      </header>

      <main class="pm-main">
        <p class="pm-pill">User Flow</p>
        <h1>수강 신청</h1>
        <p class="pm-summary">오픈된 과정을 확인하고 수강 신청을 시작하는 진입 페이지입니다.</p>
        <div class="pm-cta-row">
          <a class="pm-btn pm-btn-ghost" href="../onboarding.html">이전 단계</a>
          <a class="pm-btn pm-btn-primary" href="#enroll-openings">모집 목록으로</a>
        </div>

        <section class="pm-card" id="enroll-openings">
          <h2>모집 중 과정 (API)</h2>
          <p class="auth-message info" data-api="course-openings-status">불러오는 중…</p>
          <div class="pm-table-wrap">
            <table class="pm-table">
              <thead>
                <tr>
                  <th>모집 ID</th>
                  <th>과정명</th>
                  <th>수강 기간</th>
                  <th>신청</th>
                  <th>가격</th>
                  <th></th>
                </tr>
              </thead>
              <tbody data-api="course-openings-body"></tbody>
            </table>
          </div>
        </section>

        <section class="pm-card">
          <h2>현재 경로</h2>
          <p class="pm-route">/enroll</p>
        </section>

        <section class="pm-card">
          <h2>연결 페이지</h2>
          <ul class="pm-link-list">
          <li><a href="../my-courses/index.html">/my-courses</a></li>
          <li><a href="../support/faq/index.html">/support/faq</a></li>
            <li><a href="./opening/index.html?openingId=1">/enroll/opening (예시)</a></li>
            <li><a href="./apply/index.html?openingId=1">/enroll/apply (예시)</a></li>
            <li><a href="./payment/index.html">/enroll/payment</a></li>
          </ul>
        </section>
      </main>

      <footer class="pm-footer">
        <a href="../index.html">메인으로</a>
        <a href="../support/index.html">고객센터</a>
        <a href="../pages.html">사이트맵</a>
      </footer>
    </div>
    <script defer src="../assets/auth-client.js"></script>
