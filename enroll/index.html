      <header class="pm-header">

      <main class="pm-main">
        <p class="pm-pill">User Flow</p>
        <h1>수강 신청</h1>
        <p class="pm-summary">내가 신청한 수강 과정 현황을 확인하는 페이지입니다.</p>
        <div class="pm-cta-row">

          <a class="pm-btn pm-btn-primary" href="#enroll-openings">내 신청 내역</a>
        </div>

        <section class="pm-card" id="enroll-openings">
          <h2>내 수강신청 내역</h2>
          <p class="auth-message info" data-api="course-openings-status">내 신청 내역을 불러오는 중…</p>
          <div class="pm-table-wrap">
            <table class="pm-table">
              <thead>
                <tr>
                  <th>신청 ID</th>
                  <th>과정명</th>
                  <th>결제</th>
                  <th>승인</th>
                  <th>가격</th>
                  <th></th>
                </tr>
              </thead>
              <tbody data-api="mypage-enrollments-body"></tbody>
            </table>
          </div>
        </section>

        <section class="pm-card">
          <h2>현재 경로</h2>
          <p class="pm-route">/enroll</p>
        </section>

        <section class="pm-card">
          <h2>연결 페이지</h2>
          <ul class="pm-link-list">
          <li><a href="../my-courses/index.html">/my-courses</a></li>
          <li><a href="../support/faq/index.html">/support/faq</a></li>
            <li><a href="./opening/index.html?openingId=1">/enroll/opening (예시)</a></li>
            <li><a href="./apply/index.html?openingId=1">/enroll/apply (예시)</a></li>

      <footer class="pm-footer">
        <a href="../index.html">메인으로</a>

        <a href="../pages.html">사이트맵</a>
      </footer>
    </div>
    <script defer src="../assets/auth-client.js?v=20260510-1"></script>
    <script>
      (function () {
        const certParam = String(new URLSearchParams(window.location.search).get("cert") || "")
          .trim()
          .toLowerCase();
        if (!certParam) return;

        const certLabelMap = {
          forklift: "지게차기능사",
          excavator: "굴착기기능사",
          electric: "전기기능사",
          welding: "용접기능사",
          hazmat: "위험물산업기사",
          carrepair: "자동차정비기능사",
          beautician: "일반미용사",
          makeup: "메이크업 미용사",
          skin: "피부미용사",
          nail: "네일미용사",
          elevator: "승강기기능사",
          construction: "건설기능사",
          cookkr: "한식조리기능사",
          cookwest: "양식조리기능사",
          cookcn: "중식조리기능사",
          cookjp: "일식조리기능사",
        };
        const selectedLabel = certLabelMap[certParam] || certParam;
        const statusEl = document.querySelector("[data-api='course-openings-status']");
        const tbody = document.querySelector("[data-api='mypage-enrollments-body']");
        const heading = document.querySelector("#enroll-openings h2");
        if (heading) heading.textContent = `${selectedLabel} 신청 내역`;

        const rowMatches = (tr) => {
          const text = (tr.textContent || "").trim();
          return text.includes(selectedLabel);
        };

        const applyFilter = () => {
          if (!tbody) return;
          const rows = Array.from(tbody.querySelectorAll("tr"));
          if (!rows.length) return;
          let visibleCount = 0;
          rows.forEach((tr) => {
            const isDataRow = tr.querySelector("td") != null;
            if (!isDataRow) return;
            const visible = rowMatches(tr);
            tr.style.display = visible ? "" : "none";
            if (visible) visibleCount += 1;
          });
          if (visibleCount === 0) {
            tbody.innerHTML = `<tr><td colspan="6">${selectedLabel} 신청 내역이 없습니다.</td></tr>`;
            if (statusEl) {
              statusEl.textContent = `${selectedLabel} 과정은 현재 수강신청 준비 중입니다. 개설 후 신청 가능합니다.`;
              statusEl.className = "auth-message info";
            }
            return;
          }
          if (statusEl) {
            statusEl.textContent = `선택 과정(${selectedLabel}) 신청 내역 ${visibleCount}건`;
            statusEl.className = "auth-message success";
          }
        };

        const observer = new MutationObserver(() => applyFilter());
        if (tbody) observer.observe(tbody, { childList: true, subtree: true });
        window.addEventListener("DOMContentLoaded", applyFilter);
      })();
    </script>
  </body>
</html>
