<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PASSmaster | 이동 중…</title>
    <meta name="robots" content="noindex" />
    <script>
      (function () {
        try {
          var q = new URLSearchParams(window.location.search || "");
          var id = q.get("openingId");
          var t = "../apply/index.html";
          if (id) t += "?openingId=" + encodeURIComponent(id);
          window.location.replace(t);
        } catch (_e) {
          window.location.replace("../apply/index.html");
        }
      })();
    </script>
    <link rel="stylesheet" href="../../assets/shared.css" />
  </head>
  <body>
    <p style="font-family: system-ui, sans-serif; padding: 2rem">
      신청서 페이지로 이동합니다.
      <a href="../apply/index.html">여기를 눌러 이동</a>
    </p>
  </body>
</html>
