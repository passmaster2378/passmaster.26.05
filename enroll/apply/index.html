<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PASSmaster | 수강 신청서</title>
    <link rel="stylesheet" href="../../assets/shared.css" />
    <script defer src="../../assets/shared.js"></script>
  </head>
  <body>
    <div class="pm-shell">
      <header class="pm-header">
        <a class="pm-logo" href="../../index.html">PASSmaster</a>
        <nav class="pm-nav" aria-label="공통 이동">
          <a href="../../login.html">로그인</a>
          <a href="../../register.html">회원가입</a>
          <a href="../index.html">수강신청</a>
          <a href="../../my-courses/index.html">내 강의</a>
          <a href="../../admin/index.html">관리자</a>
          <a href="../../pages.html">전체 페이지</a>
        </nav>
      </header>

      <main class="pm-main">
        <p class="pm-pill">User Flow · 3/4 신청서</p>
        <h1>수강 신청서</h1>
        <p class="pm-summary">모집 정보를 확인하고 약관에 동의한 뒤 신청을 확정합니다. 로그인한 회원만 제출할 수 있습니다.</p>
        <div class="pm-cta-row">
          <a class="pm-btn pm-btn-ghost" data-api="enroll-apply-back" href="../index.html">이전 단계</a>
        </div>

        <section class="pm-card" data-api="enroll-apply-root">
          <h2>신청 대상 모집</h2>
          <p class="auth-message info" data-api="enroll-apply-message">불러오는 중…</p>
          <ul class="pm-link-list" style="list-style: none; padding: 0">
            <li><strong>과정명:</strong> <span data-field="title">-</span></li>
            <li><strong>기간:</strong> <span data-field="period">-</span></li>
            <li><strong>가격:</strong> <span data-field="price">-</span></li>
          </ul>

          <form class="pm-card" style="margin-top: 16px" data-api="enroll-apply-form">
            <h3 style="margin-top: 0">확인 사항</h3>
            <label style="display: flex; gap: 8px; align-items: flex-start; margin-bottom: 10px">
              <input type="checkbox" name="agreeTerms" value="1" required />
              <span><a href="../../legal.html#terms" target="_blank" rel="noopener">이용약관</a> 및 <a href="../../legal.html#privacy" target="_blank" rel="noopener">개인정보처리방침</a>을 확인했으며 이에 동의합니다.</span>
            </label>
            <label style="display: flex; gap: 8px; align-items: flex-start; margin-bottom: 10px">
              <input type="checkbox" name="agreeRefund" value="1" required />
              <span><a href="../../legal.html#refund" target="_blank" rel="noopener">환불 규정</a>을 확인했습니다.</span>
            </label>
            <button class="pm-btn pm-btn-primary" type="submit" data-api="enroll-apply-submit">신청 확정 및 결제 안내로</button>
          </form>
        </section>

        <section class="pm-card">
          <h2>현재 경로</h2>
          <p class="pm-route">/enroll/apply</p>
        </section>
      </main>

      <footer class="pm-footer">
        <a href="../../index.html">메인으로</a>
        <a href="../../support/index.html">고객센터</a>
        <a href="../../pages.html">사이트맵</a>
      </footer>
    </div>
    <script defer src="../../assets/auth-client.js"></script>
  </body>
</html>
