<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PASSmaster | 강의 상세</title>
    <link rel="stylesheet" href="../../assets/shared.css" />
    <script defer src="../../assets/shared.js"></script>
  </head>
  <body>
    <div class="pm-shell">
      <header class="pm-header">
        <a class="pm-logo" href="../../index.html">PASSmaster</a>
        <nav class="pm-nav" aria-label="공통 이동">
          <a href="../../login.html">로그인</a>
          <a href="../../register.html">회원가입</a>
          <a href="../../enroll/index.html">수강신청</a>
          <a href="../index.html">내 강의</a>
          <a href="../../pages.html">전체 페이지</a>
        </nav>
      </header>

      <main class="pm-main">
        <p class="pm-pill">User Flow</p>
        <h1>강의 상세</h1>
        <p class="pm-summary">강의 목차, 과제, 진도율, 공지사항을 확인하는 상세 화면입니다.</p>

        <section class="pm-card" data-api="me-enrollment-detail">
          <h2>수강 상세 (API)</h2>
          <p class="auth-message info" data-api="me-enrollment-error"></p>
          <ul class="pm-link-list" style="list-style: none; padding: 0">
            <li><strong>신청 ID:</strong> <span data-field="id">-</span></li>
            <li><strong>과정:</strong> <span data-field="course">-</span></li>
            <li><strong>결제 상태:</strong> <span data-field="payment">-</span></li>
            <li><strong>승인:</strong> <span data-field="approval">-</span></li>
            <li><strong>학습:</strong> <span data-field="learning">-</span></li>
            <li><strong>진도:</strong> <span data-field="progress">-</span></li>
          </ul>
        </section>

        <section class="pm-card">
          <h2>현재 경로</h2>
          <p class="pm-route">/my-courses/[enrollmentId]</p>
        </section>

        <section class="pm-card">
          <h2>연결 페이지</h2>
          <ul class="pm-link-list">
          <li><a href="../../support/inquiry/new/index.html">/support/inquiry/new</a></li>
          <li><a href="../../mypage/notifications/index.html">/mypage/notifications</a></li>
          </ul>
        </section>

        <div class="pm-cta-row" aria-label="페이지 이동">
          <a class="pm-btn pm-btn-ghost" href="../index.html">이전 단계</a>
          <a class="pm-btn pm-btn-primary" href="../../mypage/learning/index.html">다음 단계</a>
        </div>
      </main>

      <footer class="pm-footer">
        <a href="../../index.html">메인으로</a>
        <a href="../../support/index.html">고객센터</a>
        <a href="../../pages.html">사이트맵</a>
      </footer>
    </div>
    <script defer src="../../assets/auth-client.js"></script>
  </body>
</html>
