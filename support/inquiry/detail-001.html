<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PASSmaster | 문의 상세</title>
    <link rel="stylesheet" href="../../assets/shared.css" />
    <script defer src="../../assets/shared.js"></script>
  </head>
  <body>
    <div class="pm-shell">
      <header class="pm-header">
        <a class="pm-logo" href="../../index.html">PASSmaster</a>
        <nav class="pm-nav" aria-label="공통 이동">
          <a href="../../login.html">로그인</a>
          <a href="../../register.html">회원가입</a>
          <a href="../../enroll/index.html">수강신청</a>
          <a href="../../my-courses/index.html">내 강의</a>
          <a href="../../pages.html">전체 페이지</a>
        </nav>
      </header>

      <main class="pm-main">
        <p class="pm-pill">User Flow</p>
        <h1>문의 상세</h1>
        <p class="pm-summary">
          접수된 문의의 상세 정보를 확인합니다. 본 페이지는 로그인한 회원만           조회할 수 있습니다.
        </p>

        <section class="pm-card" data-support-guest-only>
          <h2>로그인 필요</h2>
          <p class="pm-detail">문의 상세는 회원 로그인 후 이용할 수 있습니다.</p>
        </section>

        <section class="pm-card" data-support-member-only hidden data-inquiry-detail>
          <h2>문의 상세 정보</h2>
          <p class="auth-message info" data-inquiry-error>실제 문의 데이터를 조회 중입니다.</p>
          <div class="pm-table-wrap">
            <table class="pm-table" aria-label="문의 상세 정보">
              <tbody>
                <tr><th>문의번호</th><td data-inquiry-field="id">-</td></tr>
                <tr><th>문의유형</th><td data-inquiry-field="type">-</td></tr>
                <tr><th>처리상태</th><td data-inquiry-field="status">-</td></tr>
                <tr><th>제목</th><td data-inquiry-field="title">-</td></tr>
                <tr><th>문의자</th><td data-inquiry-field="userName">-</td></tr>
                <tr><th>등록일</th><td data-inquiry-field="createdAt">-</td></tr>
                <tr><th>내용</th><td data-inquiry-field="content">-</td></tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="pm-card">
          <h2>현재 경로</h2>
          <p class="pm-route">/support/inquiry/[id]</p>
        </section>

        <div class="pm-cta-row" aria-label="페이지 이동">
          <a class="pm-btn pm-btn-ghost" href="./new/index.html" data-support-member-only hidden>문의 작성</a>
          <a class="pm-btn pm-btn-ghost" href="../index.html" data-support-member-only hidden>문의 목록</a>
          <a class="pm-btn pm-btn-primary" href="../../mypage/index.html" data-support-member-only hidden>마이페이지로 가기</a>
          <a class="pm-btn pm-btn-ghost" href="../../login.html" data-support-guest-only>로그인</a>
          <a class="pm-btn pm-btn-primary" href="../../register.html" data-support-guest-only>회원가입</a>
        </div>
      </main>

      <footer class="pm-footer"></footer>
    </div>
    <script defer src="../../assets/auth-client.js?v=20260516-inquiry-detail"></script>
  </body>
</html>
