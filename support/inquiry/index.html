<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PASSmaster | 문의 목록</title>
    <link rel="stylesheet" href="../../assets/shared.css" />
    <script defer src="../../assets/shared.js"></script>
  </head>
  <body>
    <div class="pm-shell">
      <header class="pm-header">
        <a class="pm-logo" href="../../index.html">PASSmaster</a>
        <nav class="pm-nav" aria-label="공통 이동">
          <a href="../../login.html">로그인</a>
          <a href="../../register.html">회원가입</a>
          <a href="../../enroll/index.html">수강신청</a>
          <a href="../../my-courses/index.html">내 강의</a>
          <a href="../../admin/index.html">관리자</a>
          <a href="../../pages.html">전체 페이지</a>
        </nav>
      </header>

      <main class="pm-main">
        <p class="pm-pill">User Flow</p>
        <h1>문의 목록</h1>
        <p class="pm-summary">등록된 1:1 문의 목록과 처리 상태를 확인합니다.</p>
        <div class="pm-cta-row">
          <a class="pm-btn pm-btn-ghost" href="../faq/index.html">이전 단계</a>
          <a class="pm-btn pm-btn-primary" href="./new/index.html">다음 단계</a>
        </div>

        <section class="pm-card">
          <h2>문의 티켓 목록</h2>
          <p class="pm-detail" data-inquiry-list-summary>조회 중...</p>
          <div class="pm-table-wrap">
            <table class="pm-table" aria-label="문의 목록">
              <thead>
                <tr>
                  <th>문의번호</th>
                  <th>유형</th>
                  <th>제목</th>
                  <th>상태</th>
                  <th>등록일</th>
                </tr>
              </thead>
              <tbody data-inquiry-list-body>
                <tr>
                  <td colspan="5">문의 목록을 불러오는 중입니다.</td>
                </tr>
              </tbody>
            </table>
          </div>
        </section>

        <section class="pm-card">
          <h2>현재 경로</h2>
          <p class="pm-route">/support/inquiry</p>
        </section>

        <section class="pm-card">
          <h2>연결 페이지</h2>
          <ul class="pm-link-list">
          <li><a href="../../mypage/inquiries/index.html">/mypage/inquiries</a></li>
          </ul>
        </section>
      </main>

      <footer class="pm-footer">
        <a href="../../index.html">메인으로</a>
        <a href="../index.html">고객센터</a>
        <a href="../../pages.html">사이트맵</a>
      </footer>
    </div>
    <script defer src="../../assets/auth-client.js"></script>
