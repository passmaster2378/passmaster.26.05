<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메이크업 미용사 · 문제은행</title>
    <link rel="stylesheet" href="../../assets/shared.css" />
    <style>
      :root {
        --mq-bg: #e8eaec;
        --mq-card: #ffffff;
        --mq-pink: #d81b77;
        --mq-pink-soft: #fce4ec;
        --mq-bar: #c62828;
        --mq-line: #d0d4da;
        --mq-green: #2e7d32;
        --mq-green-soft: #e8f5e9;
        --mq-wrong: #c62828;
        --mq-timer-bg: #1a1a1a;
        --mq-timer-txt: #ffeb3b;
        --mq-btn-dark: #2b2b2b;
      }
      body {
        margin: 0;
        background: var(--mq-bg);
        color: #111;
        font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", sans-serif;
        min-height: 100vh;
      }
      .mq-wrap {
        width: min(560px, calc(100% - 24px));
        margin: 0 auto;
        padding: 12px 0 32px;
      }
      #view-loading {
        text-align: center;
        padding: 48px 16px;
        color: #555;
      }
      .hub-title {
        font-size: 1.35rem;
        font-weight: 800;
        margin: 8px 0 6px;
      }
      .hub-subtitle {
        margin: 0 0 14px;
        color: #5f6673;
        font-size: 13px;
        line-height: 1.5;
      }
      .hub-actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .hub-hint {
        font-size: 13px;
        color: #666;
        line-height: 1.5;
        margin: 0;
      }
      .mq-bigbtn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 20px;
        border: none;
        border-radius: 14px;
        background: linear-gradient(135deg, #236bff, #01b3ff);
        color: #fff;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
      }
      .mq-bigbtn:hover {
        filter: brightness(1.05);
      }
      .mq-bigbtn-link {
        text-decoration: none;
      }
      .mq-bigbtn--start {
        width: 100%;
      }
      .flow-wrap {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .flow-hero {
        border-radius: 16px;
        padding: 14px;
        background: linear-gradient(135deg, #edf4ff, #f5f8ff 58%, #eaf7ff);
        border: 1px solid #dfe8ff;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }
      .flow-hero-title {
        margin: 0;
        font-size: 14px;
        font-weight: 900;
        color: #2a3e66;
      }
      .flow-hero-sub {
        margin: 4px 0 10px;
        font-size: 12px;
        color: #567;
      }
      .flow-track {
        position: relative;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }
      .flow-track::before {
        content: "";
        position: absolute;
        left: 12%;
        right: 12%;
        top: 16px;
        height: 4px;
        border-radius: 999px;
        background: linear-gradient(90deg, #4da3ff, #5ec9c7, #ffd267, #7e8797);
        opacity: 0.65;
      }
      .flow-node {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        text-align: center;
        color: #53607a;
      }
      .flow-node-dot {
        width: 38px;
        height: 38px;
        border-radius: 999px;
        border: 2px solid #fff;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.12);
      }
      .flow-node-dot--1 {
        background: #4da3ff;
      }
      .flow-node-dot--2 {
        background: #5ec9c7;
      }
      .flow-node-dot--3 {
        background: #ffd267;
      }
      .flow-node-dot--4 {
        background: #7e8797;
      }
      .flow-stage {
        position: relative;
        border-radius: 18px;
        background: #fff;
        padding: 14px 14px 12px;
        border: 1px solid #eceff3;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.06);
        overflow: hidden;
      }
      .flow-stage::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 6px;
        border-radius: 6px;
      }
      .flow-stage--1::before {
        background: linear-gradient(180deg, #ff6b6b, #ff8e53);
      }
      .flow-stage--2::before {
        background: linear-gradient(180deg, #35c9b3, #29b6f6);
      }
      .flow-stage--3::before {
        background: linear-gradient(180deg, #ffd54f, #ffb300);
      }
      .flow-stage--4::before {
        background: linear-gradient(180deg, #424242, #212121);
      }
      .flow-head {
        font-size: 13px;
        font-weight: 900;
        margin: 0;
      }
      .flow-stage-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin: 0 0 10px 10px;
      }
      .flow-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 11px;
        font-weight: 800;
        color: #fff;
      }
      .flow-badge--1 {
        background: #f06292;
      }
      .flow-badge--2 {
        background: #26a69a;
      }
      .flow-badge--3 {
        background: #ffb300;
      }
      .flow-badge--4 {
        background: #455a64;
      }
      .flow-media {
        margin: 0 0 10px;
        border-radius: 14px;
        padding: 12px;
        background: linear-gradient(135deg, #f6f8fb, #eef2f7);
        border: 1px solid #e4e9f0;
      }
      .flow-media svg {
        width: 100%;
        height: 62px;
        display: block;
      }
      .flow-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }
      .flow-grid--two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .flow-chip {
        min-height: 66px;
        border-radius: 12px;
        border: 1px solid #e4e7ee;
        background: #f7f8fc;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 10px 8px;
        font-size: 15px;
        font-weight: 700;
        color: #4d5665;
      }
      .flow-chip--active {
        color: #fff;
        border-color: transparent;
        background: linear-gradient(135deg, #1a84dd, #4b9be8);
        box-shadow: 0 8px 14px rgba(33, 124, 212, 0.34);
      }
      .flow-chip--lock {
        background: #f1f3f8;
        color: #a0a7b4;
      }
      .flow-arrow {
        display: flex;
        justify-content: center;
        align-items: center;
        color: #98a3b8;
        font-size: 20px;
        line-height: 1;
      }
      .flow-action {
        margin-top: 10px;
        width: 100%;
        min-height: 40px;
        border-radius: 12px;
        border: none;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
        color: #fff;
        background: linear-gradient(135deg, #1a84dd, #4b9be8);
      }
      .flow-action:disabled {
        cursor: not-allowed;
        background: #d4d9e4;
        color: #9aa3b3;
      }
      .loop-board {
        border-radius: 16px;
        border: 1px dashed #c8d3e8;
        background: #f7f9fe;
        padding: 12px;
      }
      .loop-head {
        margin: 0 0 10px;
        font-size: 13px;
        font-weight: 800;
        color: #3c4f73;
      }
      .loop-grid {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .loop-chip {
        border-radius: 10px;
        min-height: 48px;
        padding: 8px 10px;
        border: 1px solid #d6dfef;
        font-size: 12px;
        font-weight: 700;
        line-height: 1.35;
        display: flex;
        align-items: center;
      }
      .loop-chip--done {
        background: #e8f5e9;
        border-color: #8acb8e;
        color: #185b1c;
      }
      .loop-chip--active {
        background: #e3f2fd;
        border-color: #80bfff;
        color: #114a8a;
      }
      .loop-chip--lock {
        background: #f0f2f7;
        border-color: #dce2ed;
        color: #7b8599;
      }
      .flow-links {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
      }
      .flow-mini-actions {
        display: grid;
        grid-template-columns: repeat(2, minmax(0, 1fr));
        gap: 8px;
        margin-top: 10px;
      }
      .flow-subbtn {
        min-height: 42px;
        border: 1px solid #ccd6e8;
        border-radius: 10px;
        background: #fff;
        color: #2f4c7a;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
      }
      .flow-subbtn:disabled {
        background: #edf1f7;
        color: #9aa4b5;
        cursor: not-allowed;
      }
      #load-error {
        margin-top: 12px;
        padding: 12px;
        border-radius: 10px;
        background: #ffebee;
        color: #b71c1c;
        font-size: 14px;
      }
      .admin-panel {
        margin-bottom: 12px;
        border: 1px solid #cdd5e4;
        border-radius: 14px;
        background: #f9fbff;
        overflow: hidden;
      }
      .admin-panel summary {
        cursor: pointer;
        padding: 10px 12px;
        font-size: 13px;
        font-weight: 800;
        background: #eef3ff;
      }
      .admin-body {
        padding: 10px 12px 12px;
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .admin-row {
        display: flex;
        gap: 8px;
        flex-wrap: wrap;
        align-items: center;
      }
      .admin-tag {
        font-size: 12px;
        background: #fff;
        border: 1px solid #dce3f3;
        border-radius: 999px;
        padding: 4px 8px;
      }
      .admin-pre {
        margin: 0;
        white-space: pre-line;
        font-size: 12px;
        color: #374151;
        line-height: 1.45;
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 10px;
        padding: 8px;
      }
      .admin-btn {
        border: 1px solid #c5d2ee;
        background: #fff;
        color: #304c86;
        border-radius: 10px;
        padding: 7px 10px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }
      .admin-btn:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }
      .admin-mini-input {
        width: 64px;
        border: 1px solid #c5d2ee;
        border-radius: 8px;
        padding: 6px 8px;
        font-size: 12px;
      }

      /* --- Quiz top bar --- */
      .mq-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 12px;
      }
      .mq-top-left {
        display: flex;
        gap: 6px;
      }
      .mq-pill {
        border: 1px solid #bbb;
        background: #fff;
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }
      .mq-pill:hover {
        background: #f5f5f5;
      }
      .mq-progress {
        font-weight: 800;
        font-size: 15px;
      }
      .mq-timer {
        padding: 6px 12px;
        border-radius: 10px;
        background: var(--mq-timer-bg);
        color: var(--mq-timer-txt);
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        font-size: 14px;
      }
      .mq-timer--off {
        opacity: 0.85;
      }
      .mq-round-label {
        font-size: 12px;
        color: #666;
        text-align: center;
        margin: 0 0 8px;
      }

      .mq-card {
        background: var(--mq-card);
        border-radius: 16px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
        padding: 18px 16px 16px;
      }
      .mq-cat {
        font-size: 13px;
        font-weight: 700;
        color: var(--mq-pink);
        margin: 0 0 10px;
      }
      .mq-q {
        font-size: 16px;
        font-weight: 800;
        line-height: 1.45;
        margin: 0 0 16px;
      }
      .mq-options {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .mq-opt {
        width: 100%;
        text-align: left;
        padding: 12px 14px;
        border: 1px solid var(--mq-line);
        border-radius: 12px;
        background: #fff;
        font-size: 14px;
        line-height: 1.4;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
      }
      .mq-opt:hover:not(:disabled) {
        border-color: #9e9e9e;
      }
      .mq-opt--correct {
        border-color: var(--mq-green);
        background: var(--mq-green-soft);
        font-weight: 700;
      }
      .mq-opt--wrong {
        border-color: var(--mq-wrong);
        background: #ffebee;
      }
      .mq-opt--plain {
        cursor: pointer;
      }
      .mq-explain {
        margin-top: 14px;
        padding: 12px 12px 12px 14px;
        border-radius: 12px;
        background: var(--mq-pink-soft);
        border-left: 4px solid var(--mq-bar);
        font-size: 13px;
        line-height: 1.5;
        color: #333;
      }
      .mq-explain::before {
        content: "💡 ";
      }
      .mq-bottom-nav {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }
      .mq-bottom-nav .mq-pill {
        flex: 1;
        text-align: center;
        justify-content: center;
      }
      .mq-next-main {
        flex: 2;
        min-height: 48px;
        border: none;
        border-radius: 14px;
        background: var(--mq-btn-dark);
        color: #fff;
        font-size: 15px;
        font-weight: 800;
        cursor: pointer;
      }
      .mq-next-main:hover {
        background: #000;
      }
      .mq-next-main:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      /* Mock exam: no explanation */
      .mock-hint {
        font-size: 12px;
        color: #666;
        margin: 8px 0 0;
        text-align: center;
      }

      .pm-card.result-mock {
        text-align: center;
      }
      .result-score {
        font-size: 2rem;
        font-weight: 900;
        margin: 12px 0;
      }
      .result-pass {
        font-size: 15px;
        margin-bottom: 16px;
      }
      .result-mini-graph {
        margin: 0 0 14px;
      }
      .result-mini-graph .mq-bar-row {
        grid-template-columns: 1fr minmax(120px, 2fr) auto;
      }
      .dash-block {
        margin-bottom: 28px;
      }
      .dash-block h3 {
        font-size: 15px;
        margin: 0 0 12px;
      }
      .mq-bars {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .mq-bar-row {
        display: grid;
        grid-template-columns: 1fr minmax(80px, 2fr) auto;
        align-items: center;
        gap: 8px;
        font-size: 13px;
      }
      .mq-bar-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .mq-bar-track {
        height: 22px;
        background: #e0e0e0;
        border-radius: 8px;
        overflow: hidden;
      }
      .mq-bar-track--pass {
        max-width: 100%;
      }
      .mq-bar-fill {
        height: 100%;
        background: #5c6bc0;
        border-radius: 8px;
        min-width: 4px;
        transition: width 0.2s;
      }
      .mq-bar-fill--ok {
        background: var(--mq-green);
      }
      .mq-bar-fill--bad {
        background: #e53935;
      }
      .mq-bar-num {
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        min-width: 5.5rem;
        text-align: right;
      }
      .dash-empty {
        font-size: 14px;
        color: #666;
      }
      .qa-list {
        display: grid;
        gap: 8px;
      }
      .qa-item {
        display: flex;
        align-items: center;
        gap: 8px;
        border: 1px solid #dde3ef;
        border-radius: 10px;
        background: #fff;
        padding: 8px 10px;
        font-size: 13px;
      }
      .qa-save-msg {
        margin-top: 8px;
        font-size: 12px;
        color: #3f4d63;
      }
      .final-qnet a {
        color: #0f49c2;
        font-weight: 700;
      }
      .trial-callout {
        border: 1px solid #f8bbd0;
        background: linear-gradient(135deg, #fff5f8, #fff);
        border-radius: 14px;
        padding: 12px 14px;
        margin-bottom: 14px;
        font-size: 13px;
        line-height: 1.55;
        color: #4a3b45;
      }
      .trial-callout strong {
        color: #ad1457;
      }
      .trial-callout .trial-actions {
        display: flex;
        flex-wrap: wrap;
        gap: 8px;
        margin-top: 10px;
      }
      .trial-mode-strip {
        font-size: 12px;
        color: #7b1fa2;
        background: #f3e5f5;
        border-radius: 10px;
        padding: 8px 10px;
        margin: 0 0 8px;
        line-height: 1.45;
      }
    </style>
  </head>
  <body>
    <p class="pm-route" hidden>/study/makeup</p>
    <div class="pm-shell">
      <header class="pm-header">
        <a class="pm-logo" href="../../index.html">PASSmaster</a>
        <nav class="pm-nav" aria-label="공통 이동">
          <a href="../../login.html">로그인</a>
          <a href="../../register.html">회원가입</a>
          <a href="../../enroll/index.html?cert=makeup#enroll-openings">수강신청</a>
          <a href="../../cert/info.html?slug=makeup">자격 안내</a>
          <a href="../../index.html#cert-courses">자격증 목록</a>
        </nav>
      </header>

      <main class="pm-main mq-wrap">
        <details id="admin-panel" class="admin-panel">
          <summary>관리자 검증 패널</summary>
          <div class="admin-body">
            <div class="admin-row">
              <label class="admin-tag">
                <input type="checkbox" id="admin-mode-toggle" />
                관리자 모드
              </label>
              <span class="admin-tag" id="admin-current">화면: -</span>
              <span class="admin-tag" id="admin-step">단계: -</span>
            </div>
            <div class="admin-row">
              <span class="admin-tag" id="admin-config">현재 규칙: -</span>
            </div>
            <pre class="admin-pre" id="admin-shuffle">최근 셔플 로그 없음</pre>
            <pre class="admin-pre" id="admin-last-action">최근 관리자 액션 없음</pre>
            <div class="admin-row">
              <button type="button" class="admin-btn" id="btn-admin-force-complete">현재 회차 강제 완료</button>
              <button type="button" class="admin-btn" id="btn-admin-start-r1">1차 바로 시작</button>
              <button type="button" class="admin-btn" id="btn-admin-start-r2">2차 바로 시작</button>
              <button type="button" class="admin-btn" id="btn-admin-start-r3">3차 바로 시작</button>
            </div>
            <div class="admin-row">
              <label class="admin-tag">기출 회차 직접 시작</label>
              <input id="admin-mock-round" class="admin-mini-input" type="number" min="1" max="6" value="1" />
              <button type="button" class="admin-btn" id="btn-admin-start-mock">기출 시작</button>
            </div>
          </div>
        </details>

        <div id="view-loading" class="pm-card">
          <p>문항을 불러오는 중…</p>
        </div>

        <div id="view-hub" class="pm-card" hidden>
          <p class="pm-pill">메이크업 미용사</p>
          <h1 class="hub-title">필기 문제은행</h1>
          <div id="hub-actions" class="hub-actions"></div>
          <p id="load-error" class="pm-detail" hidden></p>
        </div>

        <!-- 학습·복습 (레퍼런스 이미지 스타일) -->
        <div id="view-quiz" hidden>
          <p id="q-round-label" class="mq-round-label"></p>
          <div class="mq-top">
            <div class="mq-top-left">
              <button type="button" class="mq-pill" id="btn-stop">중단</button>
              <button type="button" class="mq-pill" id="btn-prev-top">이전</button>
            </div>
            <span class="mq-progress" id="q-progress">0 / 0</span>
            <span class="mq-timer mq-timer--off" id="q-timer">00:00</span>
          </div>
          <div class="mq-card">
            <p class="mq-cat" id="q-cat">과목</p>
            <p class="mq-q" id="q-body"></p>
            <div class="mq-options" id="q-options"></div>
            <div id="q-explain" class="mq-explain" hidden><span id="q-explain-text"></span></div>
            <div class="mq-bottom-nav">
              <button type="button" class="mq-pill" id="q-nav-prev">이전</button>
              <button type="button" class="mq-next-main" id="q-next">다음 문제</button>
            </div>
          </div>
        </div>

        <!-- 기출 모의 (해설 없음 / 자동 진행) -->
        <div id="view-mock" hidden>
          <p id="trial-mode-strip-mock" class="trial-mode-strip" hidden></p>
          <p id="m-round-label" class="mq-round-label"></p>
          <div class="mq-top">

            <div class="mq-options" id="m-options"></div>
            <p class="mock-hint">정답 선택 시 바로 다음 문항으로 넘어갑니다. (해설 없음)</p>

        </div>

        <div id="view-result-mock" class="pm-card result-mock" hidden>
          <h2>이번 회차 결과</h2>

          <div id="r-mock-graph" class="result-mini-graph"></div>
          <button type="button" class="mq-bigbtn" id="r-mock-next">다음</button>

        <div id="view-dashboard" class="pm-card" hidden>
          <h2>기출 6회 분석</h2>
          <div id="dash-charts"></div>
          <div class="dash-block">
            <h3>운영 QA 체크리스트</h3>
            <div class="qa-list" id="qa-checklist"></div>
            <button type="button" class="mq-bigbtn" id="btn-qa-save" style="margin-top: 10px; width: 100%">
              QA 체크 저장
            </button>
            <p id="qa-save-msg" class="qa-save-msg"></p>
          </div>
          <button type="button" class="mq-bigbtn" id="btn-dash-review" style="margin-top: 16px; width: 100%">
            기출 오답 복습 (30초)
          </button>
          <div class="flow-links" style="margin-top: 10px">
            <a class="mq-bigbtn mq-bigbtn-link" href="./wrong-note.html">오답노트</a>
            <a class="mq-bigbtn mq-bigbtn-link" href="./review-share.html">후기작성/공유</a>
          </div>
        </div>

        <div id="view-final" class="pm-card" hidden>
          <h2>최종 요약</h2>
          <div id="final-text"></div>
          <div id="final-bar" style="margin-top: 20px"></div>
          <div id="final-actions" class="flow-links" style="margin-top: 14px"></div>
        </div>
      </main>

      <footer class="pm-footer"></footer>
    </div>
