<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메이크업 미용사 · 문제은행</title>
    <link rel="stylesheet" href="../../assets/shared.css" />
    <style>
      :root {
        --mq-bg: #e8eaec;
        --mq-card: #ffffff;
        --mq-pink: #d81b77;
        --mq-pink-soft: #fce4ec;
        --mq-bar: #c62828;
        --mq-line: #d0d4da;
        --mq-green: #2e7d32;
        --mq-green-soft: #e8f5e9;
        --mq-wrong: #c62828;
        --mq-timer-bg: #1a1a1a;
        --mq-timer-txt: #ffeb3b;
        --mq-btn-dark: #2b2b2b;
      }
      body {
        margin: 0;
        background: var(--mq-bg);
        color: #111;
        font-family: "Pretendard", "Noto Sans KR", "Malgun Gothic", sans-serif;
        min-height: 100vh;
      }
      .mq-wrap {
        width: min(560px, calc(100% - 24px));
        margin: 0 auto;
        padding: 12px 0 32px;
      }
      #view-loading {
        text-align: center;
        padding: 48px 16px;
        color: #555;
      }
      .hub-title {
        font-size: 1.35rem;
        font-weight: 800;
        margin: 8px 0 6px;
      }
      .hub-subtitle {
        margin: 0 0 14px;
        color: #5f6673;
        font-size: 13px;
        line-height: 1.5;
      }
      .hub-actions {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .hub-hint {
        font-size: 13px;
        color: #666;
        line-height: 1.5;
        margin: 0;
      }
      .mq-bigbtn {
        display: inline-flex;
        align-items: center;
        justify-content: center;
        min-height: 48px;
        padding: 0 20px;
        border: none;
        border-radius: 14px;
        background: linear-gradient(135deg, #236bff, #01b3ff);
        color: #fff;
        font-size: 16px;
        font-weight: 800;
        cursor: pointer;
      }
      .mq-bigbtn:hover {
        filter: brightness(1.05);
      }
      .mq-bigbtn--start {
        width: 100%;
      }
      .flow-wrap {
        display: flex;
        flex-direction: column;
        gap: 12px;
      }
      .flow-hero {
        border-radius: 16px;
        padding: 14px;
        background: linear-gradient(135deg, #edf4ff, #f5f8ff 58%, #eaf7ff);
        border: 1px solid #dfe8ff;
        box-shadow: inset 0 1px 0 rgba(255, 255, 255, 0.8);
      }
      .flow-hero-title {
        margin: 0;
        font-size: 14px;
        font-weight: 900;
        color: #2a3e66;
      }
      .flow-hero-sub {
        margin: 4px 0 10px;
        font-size: 12px;
        color: #567;
      }
      .flow-track {
        position: relative;
        display: grid;
        grid-template-columns: repeat(4, minmax(0, 1fr));
        gap: 10px;
      }
      .flow-track::before {
        content: "";
        position: absolute;
        left: 12%;
        right: 12%;
        top: 16px;
        height: 4px;
        border-radius: 999px;
        background: linear-gradient(90deg, #4da3ff, #5ec9c7, #ffd267, #7e8797);
        opacity: 0.65;
      }
      .flow-node {
        position: relative;
        z-index: 1;
        display: flex;
        flex-direction: column;
        align-items: center;
        gap: 6px;
        font-size: 11px;
        text-align: center;
        color: #53607a;
      }
      .flow-node-dot {
        width: 26px;
        height: 26px;
        border-radius: 999px;
        border: 2px solid #fff;
        box-shadow: 0 3px 8px rgba(0, 0, 0, 0.12);
      }
      .flow-node-dot--1 {
        background: #4da3ff;
      }
      .flow-node-dot--2 {
        background: #5ec9c7;
      }
      .flow-node-dot--3 {
        background: #ffd267;
      }
      .flow-node-dot--4 {
        background: #7e8797;
      }
      .flow-stage {
        position: relative;
        border-radius: 18px;
        background: #fff;
        padding: 14px 14px 12px;
        border: 1px solid #eceff3;
        box-shadow: 0 8px 18px rgba(0, 0, 0, 0.06);
        overflow: hidden;
      }
      .flow-stage::before {
        content: "";
        position: absolute;
        left: 0;
        top: 0;
        bottom: 0;
        width: 6px;
        border-radius: 6px;
      }
      .flow-stage--1::before {
        background: linear-gradient(180deg, #ff6b6b, #ff8e53);
      }
      .flow-stage--2::before {
        background: linear-gradient(180deg, #35c9b3, #29b6f6);
      }
      .flow-stage--3::before {
        background: linear-gradient(180deg, #ffd54f, #ffb300);
      }
      .flow-stage--4::before {
        background: linear-gradient(180deg, #424242, #212121);
      }
      .flow-head {
        font-size: 13px;
        font-weight: 900;
        margin: 0;
      }
      .flow-stage-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 10px;
        margin: 0 0 10px 10px;
      }
      .flow-badge {
        display: inline-flex;
        align-items: center;
        gap: 6px;
        border-radius: 999px;
        padding: 4px 10px;
        font-size: 11px;
        font-weight: 800;
        color: #fff;
      }
      .flow-badge--1 {
        background: #f06292;
      }
      .flow-badge--2 {
        background: #26a69a;
      }
      .flow-badge--3 {
        background: #ffb300;
      }
      .flow-badge--4 {
        background: #455a64;
      }
      .flow-media {
        margin: 0 0 10px;
        border-radius: 14px;
        padding: 12px;
        background: linear-gradient(135deg, #f6f8fb, #eef2f7);
        border: 1px solid #e4e9f0;
      }
      .flow-media svg {
        width: 100%;
        height: 44px;
        display: block;
      }
      .flow-grid {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
      }
      .flow-grid--two {
        grid-template-columns: repeat(2, minmax(0, 1fr));
      }
      .flow-chip {
        min-height: 52px;
        border-radius: 12px;
        border: 1px solid #e4e7ee;
        background: #f7f8fc;
        display: flex;
        align-items: center;
        justify-content: center;
        text-align: center;
        padding: 8px 6px;
        font-size: 13px;
        font-weight: 700;
        color: #4d5665;
      }
      .flow-chip--active {
        color: #fff;
        border-color: transparent;
        background: linear-gradient(135deg, #1a84dd, #4b9be8);
        box-shadow: 0 8px 14px rgba(33, 124, 212, 0.34);
      }
      .flow-chip--lock {
        background: #f1f3f8;
        color: #a0a7b4;
      }
      .flow-arrow {
        display: flex;
        justify-content: center;
        align-items: center;
        color: #98a3b8;
        font-size: 20px;
        line-height: 1;
      }
      .flow-action {
        margin-top: 10px;
        width: 100%;
        min-height: 40px;
        border-radius: 12px;
        border: none;
        font-size: 13px;
        font-weight: 800;
        cursor: pointer;
        color: #fff;
        background: linear-gradient(135deg, #1a84dd, #4b9be8);
      }
      .flow-action:disabled {
        cursor: not-allowed;
        background: #d4d9e4;
        color: #9aa3b3;
      }
      #load-error {
        margin-top: 12px;
        padding: 12px;
        border-radius: 10px;
        background: #ffebee;
        color: #b71c1c;
        font-size: 14px;
      }

      /* --- Quiz top bar --- */
      .mq-top {
        display: flex;
        align-items: center;
        justify-content: space-between;
        gap: 8px;
        margin-bottom: 12px;
      }
      .mq-top-left {
        display: flex;
        gap: 6px;
      }
      .mq-pill {
        border: 1px solid #bbb;
        background: #fff;
        border-radius: 999px;
        padding: 6px 12px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }
      .mq-pill:hover {
        background: #f5f5f5;
      }
      .mq-progress {
        font-weight: 800;
        font-size: 15px;
      }
      .mq-timer {
        padding: 6px 12px;
        border-radius: 10px;
        background: var(--mq-timer-bg);
        color: var(--mq-timer-txt);
        font-weight: 800;
        font-variant-numeric: tabular-nums;
        font-size: 14px;
      }
      .mq-timer--off {
        opacity: 0.85;
      }
      .mq-round-label {
        font-size: 12px;
        color: #666;
        text-align: center;
        margin: 0 0 8px;
      }

      .mq-card {
        background: var(--mq-card);
        border-radius: 16px;
        box-shadow: 0 8px 28px rgba(0, 0, 0, 0.08);
        padding: 18px 16px 16px;
      }
      .mq-cat {
        font-size: 13px;
        font-weight: 700;
        color: var(--mq-pink);
        margin: 0 0 10px;
      }
      .mq-q {
        font-size: 16px;
        font-weight: 800;
        line-height: 1.45;
        margin: 0 0 16px;
      }
      .mq-options {
        display: flex;
        flex-direction: column;
        gap: 8px;
      }
      .mq-opt {
        width: 100%;
        text-align: left;
        padding: 12px 14px;
        border: 1px solid var(--mq-line);
        border-radius: 12px;
        background: #fff;
        font-size: 14px;
        line-height: 1.4;
        cursor: pointer;
        transition: border-color 0.15s, background 0.15s;
      }
      .mq-opt:hover:not(:disabled) {
        border-color: #9e9e9e;
      }
      .mq-opt--correct {
        border-color: var(--mq-green);
        background: var(--mq-green-soft);
        font-weight: 700;
      }
      .mq-opt--wrong {
        border-color: var(--mq-wrong);
        background: #ffebee;
      }
      .mq-opt--plain {
        cursor: pointer;
      }
      .mq-explain {
        margin-top: 14px;
        padding: 12px 12px 12px 14px;
        border-radius: 12px;
        background: var(--mq-pink-soft);
        border-left: 4px solid var(--mq-bar);
        font-size: 13px;
        line-height: 1.5;
        color: #333;
      }
      .mq-explain::before {
        content: "💡 ";
      }
      .mq-bottom-nav {
        display: flex;
        gap: 8px;
        margin-top: 16px;
      }
      .mq-bottom-nav .mq-pill {
        flex: 1;
        text-align: center;
        justify-content: center;
      }
      .mq-next-main {
        flex: 2;
        min-height: 48px;
        border: none;
        border-radius: 14px;
        background: var(--mq-btn-dark);
        color: #fff;
        font-size: 15px;
        font-weight: 800;
        cursor: pointer;
      }
      .mq-next-main:hover {
        background: #000;
      }
      .mq-next-main:disabled {
        opacity: 0.45;
        cursor: not-allowed;
      }

      /* Mock exam: no explanation */
      .mock-hint {
        font-size: 12px;
        color: #666;
        margin: 8px 0 0;
        text-align: center;
      }

      .pm-card.result-mock {
        text-align: center;
      }
      .result-score {
        font-size: 2rem;
        font-weight: 900;
        margin: 12px 0;
      }
      .result-pass {
        font-size: 15px;
        margin-bottom: 16px;
      }
      .dash-block {
        margin-bottom: 28px;
      }
      .dash-block h3 {
        font-size: 15px;
        margin: 0 0 12px;
      }
      .mq-bars {
        display: flex;
        flex-direction: column;
        gap: 10px;
      }
      .mq-bar-row {
        display: grid;
        grid-template-columns: 1fr minmax(80px, 2fr) auto;
        align-items: center;
        gap: 8px;
        font-size: 13px;
      }
      .mq-bar-label {
        overflow: hidden;
        text-overflow: ellipsis;
        white-space: nowrap;
      }
      .mq-bar-track {
        height: 22px;
        background: #e0e0e0;
        border-radius: 8px;
        overflow: hidden;
      }
      .mq-bar-track--pass {
        max-width: 100%;
      }
      .mq-bar-fill {
        height: 100%;
        background: #5c6bc0;
        border-radius: 8px;
        min-width: 4px;
        transition: width 0.2s;
      }
      .mq-bar-fill--ok {
        background: var(--mq-green);
      }
      .mq-bar-fill--bad {
        background: #e53935;
      }
      .mq-bar-num {
        font-weight: 700;
        font-variant-numeric: tabular-nums;
        min-width: 5.5rem;
        text-align: right;
      }
      .dash-empty {
        font-size: 14px;
        color: #666;
      }
      .final-qnet a {
        color: #0f49c2;
        font-weight: 700;
      }
    </style>
  </head>
  <body>
    <div class="pm-shell">
      <header class="pm-header">
        <a class="pm-logo" href="../../index.html">PASSmaster</a>
        <nav class="pm-nav" aria-label="공통 이동">
          <a href="../../cert/info.html?slug=makeup">자격 안내</a>
          <a href="../../index.html#cert-courses">자격증 목록</a>
        </nav>
      </header>

      <main class="pm-main mq-wrap">
        <div id="view-loading" class="pm-card">
          <p>문항을 불러오는 중…</p>
        </div>

        <div id="view-hub" class="pm-card" hidden>
          <p class="pm-pill">메이크업 미용사</p>
          <h1 class="hub-title">필기 문제은행</h1>
          <p class="hub-subtitle">문제 풀이 진행 방식을 그래프 형태로 확인하고 순서대로 시작하세요.</p>
          <div id="hub-actions" class="hub-actions"></div>
          <p id="load-error" class="pm-detail" hidden></p>
        </div>

        <!-- 학습·복습 (레퍼런스 이미지 스타일) -->
        <div id="view-quiz" hidden>
          <p id="q-round-label" class="mq-round-label"></p>
          <div class="mq-top">
            <div class="mq-top-left">
              <button type="button" class="mq-pill" id="btn-stop">중단</button>
              <button type="button" class="mq-pill" id="btn-prev-top">이전</button>
            </div>
            <span class="mq-progress" id="q-progress">0 / 0</span>
            <span class="mq-timer mq-timer--off" id="q-timer">00:00</span>
          </div>
          <div class="mq-card">
            <p class="mq-cat" id="q-cat">과목</p>
            <p class="mq-q" id="q-body"></p>
            <div class="mq-options" id="q-options"></div>
            <div id="q-explain" class="mq-explain" hidden><span id="q-explain-text"></span></div>
            <div class="mq-bottom-nav">
              <button type="button" class="mq-pill" id="q-nav-prev">이전</button>
              <button type="button" class="mq-next-main" id="q-next">다음 문제</button>
            </div>
          </div>
        </div>

        <!-- 기출 모의 (해설 없음 / 자동 진행) -->
        <div id="view-mock" hidden>
          <p id="m-round-label" class="mq-round-label"></p>
          <div class="mq-top">
            <div class="mq-top-left">
              <button type="button" class="mq-pill" id="btn-stop-mock">중단</button>
            </div>
            <span class="mq-progress" id="m-progress">0 / 60</span>
            <span class="mq-timer" id="m-timer">00:40</span>
          </div>
          <div class="mq-card">
            <p class="mq-cat" id="m-cat">과목</p>
            <p class="mq-q" id="m-body"></p>
            <div class="mq-options" id="m-options"></div>
            <p class="mock-hint">정답 선택 시 바로 다음 문항으로 넘어갑니다. (해설 없음)</p>
          </div>
        </div>

        <div id="view-result-mock" class="pm-card result-mock" hidden>
          <h2>이번 회차 결과</h2>
          <p class="result-score" id="r-mock-score">0 / 60</p>
          <p class="result-pass" id="r-mock-pass"></p>
          <button type="button" class="mq-bigbtn" id="r-mock-next">다음</button>
        </div>

        <div id="view-dashboard" class="pm-card" hidden>
          <h2>기출 5회 분석</h2>
          <div id="dash-charts"></div>
          <button type="button" class="mq-bigbtn" id="btn-dash-review" style="margin-top: 16px; width: 100%">
            기출 오답 복습 (30초)
          </button>
        </div>

        <div id="view-final" class="pm-card" hidden>
          <h2>최종 요약</h2>
          <div id="final-text"></div>
          <div id="final-bar" style="margin-top: 20px"></div>
        </div>
      </main>

      <footer class="pm-footer">
        <a href="../../index.html">메인으로</a>
        <a href="https://www.q-net.or.kr/" target="_blank" rel="noopener">Q-Net</a>
      </footer>
    </div>

    <script src="../../assets/js/makeup-question-engine.js"></script>
    <script src="app.js"></script>
    <script>
      document.getElementById("btn-stop-mock").addEventListener("click", () => {
        document.getElementById("btn-stop").click();
      });
    </script>
  </body>
</html>
