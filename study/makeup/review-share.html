<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메이크업 미용사 · 후기작성/리뷰 공유</title>
    <link rel="stylesheet" href="../../assets/shared.css" />
    <style>
      body {
        margin: 0;
        background: #f3f4f6;
      }
      .wrap {
        width: min(760px, calc(100% - 24px));
        margin: 0 auto;
        padding: 16px 0 28px;
      }
      .panel {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 12px;
      }
      .stats {
        font-size: 14px;
        color: #374151;
        line-height: 1.6;
      }
      .quick-actions {
        display: flex;
        gap: 8px;
        margin-top: 10px;
        flex-wrap: wrap;
      }
      .quick-link {
        border: 1px solid #ced8eb;
        border-radius: 10px;
        background: #fff;
        color: #325181;
        text-decoration: none;
        font-size: 13px;
        font-weight: 700;
        min-height: 36px;
        padding: 0 10px;
        display: inline-flex;
        align-items: center;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 700;
        margin: 8px 0 6px;
      }
      textarea,
      input,
      select {
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 10px;
        font-size: 14px;
        box-sizing: border-box;
      }
      textarea {
        min-height: 120px;
        resize: vertical;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .btn {
        border: none;
        border-radius: 10px;
        padding: 11px 14px;
        background: linear-gradient(135deg, #2563eb, #0ea5e9);
        color: #fff;
        font-weight: 800;
        cursor: pointer;
      }
      .msg {
        margin-top: 8px;
        font-size: 13px;
        color: #0f5132;
      }
      .msg.error {
        color: #b42318;
      }
      .history-item {
        border-top: 1px dashed #d1d5db;
        padding: 10px 0;
      }
      .history-item:first-child {
        border-top: none;
      }
      .history-head {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 8px;
      }
      .delete-btn {
        border: 1px solid #f2b8b5;
        background: #fff5f5;
        color: #b42318;
        border-radius: 8px;
        min-height: 30px;
        padding: 0 10px;
        font-size: 12px;
        font-weight: 700;
        cursor: pointer;
      }
      @media (max-width: 720px) {
        .row {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="pm-shell">
      <header class="pm-header">
        <a class="pm-logo" href="../../index.html">PASSmaster</a>
        <nav class="pm-nav" aria-label="공통 이동">
          <a href="./index.html">문제은행</a>
          <a href="./wrong-note.html">오답노트</a>
          <a href="../../my-courses/index.html">내 강의</a>
        </nav>
      </header>
      <main class="pm-main wrap">
        <section class="panel">
          <p class="pm-pill">수강생 전용</p>
          <h1 style="margin: 8px 0 6px">후기작성 / 리뷰 공유</h1>
          <div class="stats" id="review-seed">학습 요약을 불러오는 중...</div>
          <div class="quick-actions">
            <a class="quick-link" href="./index.html">문제은행으로 돌아가기</a>
            <a class="quick-link" href="./wrong-note.html">오답노트 보기</a>
          </div>
        </section>
        <section class="panel">
          <form id="review-form">
            <div class="row">
              <div>
                <label for="review-name">이름</label>
                <input id="review-name" type="text" placeholder="홍길동" required />
              </div>
              <div>
                <label for="review-score">만족도</label>
                <select id="review-score">
                  <option value="5">5점</option>
                  <option value="4">4점</option>
                  <option value="3">3점</option>
                  <option value="2">2점</option>
                  <option value="1">1점</option>
                </select>
              </div>
            </div>
            <label for="review-content">후기 내용</label>
            <textarea id="review-content" placeholder="학습 루프를 진행한 경험을 작성해 주세요." required></textarea>
            <button type="submit" class="btn">후기 저장</button>
            <div class="msg" id="review-msg" aria-live="polite"></div>
          </form>
        </section>
        <section class="panel">
          <h2 style="margin: 0 0 8px; font-size: 16px">내가 작성한 후기</h2>
          <div id="review-history"></div>
        </section>
      </main>
      <footer class="pm-footer">
        <a href="../../legal.html#company">회사정보</a>
        <a href="../../legal.html#terms">이용약관</a>
        <a href="../../legal.html#privacy">개인정보처리방침</a>
        <a href="../../legal.html#refund">환불정책</a>
        <a href="../../support/index.html">고객센터</a>
        <p style="margin:8px 0 0; font-size:12px; color:#667085;">
          패스마스터 · 정보관리자: 이태나 · 사업자등록번호: 326-58-00636 · 신한은행 이동길 110-623-996861
        </p>
      </footer>
    </div>
    <script>
      const DEFAULT_REMOTE_API_BASE = "https://passmaster-26-05.onrender.com/api";
      const isLocalHost =
        window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
      const isGitHubPages = /\.github\.io$/i.test(window.location.hostname);
      function normalizeApiBase(raw) {
        if (raw == null || typeof raw !== "string") return null;
        let value = raw.trim().replace(/\/+$/, "");
        if (!value) return null;
        if (!value.endsWith("/api")) value = `${value}/api`;
        return value;
      }
      const API_BASE =
        normalizeApiBase(window.PASSMASTER_API_BASE) ||
        (isLocalHost ? "http://localhost:4000/api" : isGitHubPages ? DEFAULT_REMOTE_API_BASE : "/api");

      function readSeed() {
        try {
          return JSON.parse(localStorage.getItem("makeupReviewSeed") || "{}");
        } catch (_error) {
          return {};
        }
      }
      function readHistory() {
        const rows = readPersistedReviews();
        return Array.isArray(rows) ? rows : [];
      }
      function readPersistedReviews() {
        try {
          const rows = JSON.parse(localStorage.getItem("makeupReviewHistory") || "[]");
          return Array.isArray(rows) ? rows : [];
        } catch (_error) {
          return [];
        }
      }
      function writePersistedReviews(rows) {
        localStorage.setItem("makeupReviewHistory", JSON.stringify(Array.isArray(rows) ? rows.slice(0, 50) : []));
      }
      function getSession() {
        try {
          const raw = localStorage.getItem("passmaster_auth");
          return raw ? JSON.parse(raw) : null;
        } catch (_error) {
          return null;
        }
      }
      async function requestApi(path, options = {}) {
        const session = getSession();
        if (!session || !session.token) throw new Error("로그인이 필요합니다.");
        const res = await fetch(`${API_BASE}${path}`, {
          ...options,
          headers: {
            "Content-Type": "application/json",
            Authorization: `Bearer ${session.token}`,
            ...(options.headers || {}),
          },
        });
        const data = await res.json().catch(() => ({}));
        if (!res.ok) throw new Error(data.message || "요청 처리 중 오류가 발생했습니다.");
        return data;
      }
      function statusLabel(status) {
        if (status === "approved") return "승인";
        if (status === "hidden") return "숨김";
        if (status === "rejected") return "반려";
        return "검수중";
      }
      async function hydrateRemote() {
        try {
          const artifact = await requestApi("/me/study-artifact/makeup", { method: "GET" });
          if (artifact && artifact.payload) {
            if (artifact.payload.reviewSeed && typeof artifact.payload.reviewSeed === "object") {
              localStorage.setItem("makeupReviewSeed", JSON.stringify(artifact.payload.reviewSeed));
            }
            if (artifact.payload.qaChecklist && typeof artifact.payload.qaChecklist === "object") {
              localStorage.setItem("makeupQaChecklist", JSON.stringify(artifact.payload.qaChecklist));
            }
          }
          const reviews = await requestApi("/me/reviews?certSlug=makeup", { method: "GET" });
          if (Array.isArray(reviews)) {
            const normalized = reviews.map((row) => ({
              id: row.id,
              name: row.author_name,
              score: row.score,
              content: row.content,
              status: row.status || "pending",
              moderationNote: row.moderation_note || "",
              createdAt: row.created_at ? new Date(row.created_at).toLocaleString("ko-KR") : "-",
            }));
            writePersistedReviews(normalized);
          }
        } catch (_error) {
          // 로그인/서버 오류 시 로컬 기반 동작 유지
        }
      }
      function renderSeed() {
        const seed = readSeed();
        const el = document.getElementById("review-seed");
        if (!seed || !seed.completedRounds) {
          el.textContent = "아직 저장된 학습 요약이 없습니다. 문제은행 최종 요약을 완료하면 자동 반영됩니다.";
          return;
        }
        el.innerHTML = `진행 회차: <strong>${seed.completedRounds}/${seed.totalRounds}</strong> · 합격 회차: <strong>${seed.passedRounds}</strong> · 평균 점수: <strong>${seed.avgScore100}점</strong>`;
      }
      function renderHistory() {
        const box = document.getElementById("review-history");
        const rows = readHistory();
        if (!rows.length) {
          box.innerHTML = "<p style='margin:0;color:#6b7280'>아직 작성한 후기가 없습니다.</p>";
          return;
        }
        box.innerHTML = rows
          .map(
            (r, idx) => `
            <article class="history-item">
              <div class="history-head">
                <div style="font-size:13px;color:#6b7280">${r.createdAt}</div>
                <button type="button" class="delete-btn" data-delete-index="${idx}">삭제</button>
              </div>
              <div style="font-weight:800">${r.name} · ${r.score}점 · ${statusLabel(r.status)}</div>
              <p style="margin:6px 0 0;line-height:1.5">${r.content}</p>
              ${r.moderationNote ? `<p style="margin:6px 0 0;color:#8a3b12;font-size:12px">관리자 메모: ${r.moderationNote}</p>` : ""}
            </article>
          `
          )
          .join("");
        box.querySelectorAll("[data-delete-index]").forEach((btn) => {
          btn.addEventListener("click", async () => {
            const index = Number(btn.getAttribute("data-delete-index"));
            const target = readHistory()[index];
            if (!target) return;
            if (target.id) {
              try {
                await requestApi(`/me/reviews/${target.id}`, { method: "DELETE" });
              } catch (_error) {
                // 서버 삭제 실패시에도 로컬에서는 삭제 허용
              }
            }
            const next = readHistory().filter((_row, i) => i !== index);
            writePersistedReviews(next);
            renderHistory();
          });
        });
      }
      document.getElementById("review-form").addEventListener("submit", (event) => {
        event.preventDefault();
        const name = document.getElementById("review-name").value.trim();
        const score = document.getElementById("review-score").value;
        const content = document.getElementById("review-content").value.trim();
        const msg = document.getElementById("review-msg");
        msg.classList.remove("error");
        if (!name || !content) {
          msg.classList.add("error");
          msg.textContent = "이름과 후기 내용을 입력해 주세요.";
          return;
        }
        if (content.length < 10) {
          msg.classList.add("error");
          msg.textContent = "후기 내용은 10자 이상 작성해 주세요.";
          return;
        }
        const rows = readHistory();
        let created = null;
        try {
          created = await requestApi("/me/reviews", {
            method: "POST",
            body: JSON.stringify({
              certSlug: "makeup",
              score: Number(score),
              content,
            }),
          });
        } catch (error) {
          msg.classList.add("error");
          msg.textContent = error.message || "후기 저장에 실패했습니다.";
          return;
        }
        rows.unshift({
          id: created.id,
          name,
          score,
          content,
          status: created.status || "pending",
          moderationNote: created.moderation_note || "",
          createdAt: new Date().toLocaleString("ko-KR"),
        });
        writePersistedReviews(rows);
        msg.textContent = "후기가 저장되었습니다.";
        event.target.reset();
        renderHistory();
      });
      hydrateRemote().finally(() => {
        renderSeed();
        renderHistory();
      });
    </script>
  </body>
</html>
