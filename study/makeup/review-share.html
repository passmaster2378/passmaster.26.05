<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메이크업 미용사 · 후기작성/리뷰 공유</title>
    <link rel="stylesheet" href="../../assets/shared.css" />
    <style>
      body {
        margin: 0;
        background: #f3f4f6;
      }
      .wrap {
        width: min(760px, calc(100% - 24px));
        margin: 0 auto;
        padding: 16px 0 28px;
      }
      .panel {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 14px;
        padding: 14px;
        margin-bottom: 12px;
      }
      .stats {
        font-size: 14px;
        color: #374151;
        line-height: 1.6;
      }
      label {
        display: block;
        font-size: 13px;
        font-weight: 700;
        margin: 8px 0 6px;
      }
      textarea,
      input,
      select {
        width: 100%;
        border: 1px solid #d1d5db;
        border-radius: 10px;
        padding: 10px;
        font-size: 14px;
        box-sizing: border-box;
      }
      textarea {
        min-height: 120px;
        resize: vertical;
      }
      .row {
        display: grid;
        grid-template-columns: 1fr 1fr;
        gap: 10px;
      }
      .btn {
        border: none;
        border-radius: 10px;
        padding: 11px 14px;
        background: linear-gradient(135deg, #2563eb, #0ea5e9);
        color: #fff;
        font-weight: 800;
        cursor: pointer;
      }
      .msg {
        margin-top: 8px;
        font-size: 13px;
        color: #0f5132;
      }
      .history-item {
        border-top: 1px dashed #d1d5db;
        padding: 10px 0;
      }
      .history-item:first-child {
        border-top: none;
      }
    </style>
  </head>
  <body>
    <div class="pm-shell">
      <header class="pm-header">
        <a class="pm-logo" href="../../index.html">PASSmaster</a>
        <nav class="pm-nav" aria-label="공통 이동">
          <a href="./index.html">문제은행</a>
          <a href="./wrong-note.html">오답노트</a>
          <a href="../../my-courses/index.html">내 강의</a>
        </nav>
      </header>
      <main class="pm-main wrap">
        <section class="panel">
          <p class="pm-pill">수강생 전용</p>
          <h1 style="margin: 8px 0 6px">후기작성 / 리뷰 공유</h1>
          <div class="stats" id="review-seed">학습 요약을 불러오는 중...</div>
        </section>
        <section class="panel">
          <form id="review-form">
            <div class="row">
              <div>
                <label for="review-name">이름</label>
                <input id="review-name" type="text" placeholder="홍길동" required />
              </div>
              <div>
                <label for="review-score">만족도</label>
                <select id="review-score">
                  <option value="5">5점</option>
                  <option value="4">4점</option>
                  <option value="3">3점</option>
                  <option value="2">2점</option>
                  <option value="1">1점</option>
                </select>
              </div>
            </div>
            <label for="review-content">후기 내용</label>
            <textarea id="review-content" placeholder="학습 루프를 진행한 경험을 작성해 주세요." required></textarea>
            <button type="submit" class="btn">후기 저장</button>
            <div class="msg" id="review-msg"></div>
          </form>
        </section>
        <section class="panel">
          <h2 style="margin: 0 0 8px; font-size: 16px">내가 작성한 후기</h2>
          <div id="review-history"></div>
        </section>
      </main>
    </div>
    <script>
      function readSeed() {
        try {
          return JSON.parse(localStorage.getItem("makeupReviewSeed") || "{}");
        } catch (_error) {
          return {};
        }
      }
      function readHistory() {
        try {
          const rows = JSON.parse(localStorage.getItem("makeupReviewHistory") || "[]");
          return Array.isArray(rows) ? rows : [];
        } catch (_error) {
          return [];
        }
      }
      function renderSeed() {
        const seed = readSeed();
        const el = document.getElementById("review-seed");
        if (!seed || !seed.completedRounds) {
          el.textContent = "아직 저장된 학습 요약이 없습니다. 문제은행 최종 요약을 완료하면 자동 반영됩니다.";
          return;
        }
        el.innerHTML = `진행 회차: <strong>${seed.completedRounds}/${seed.totalRounds}</strong> · 합격 회차: <strong>${seed.passedRounds}</strong> · 평균 점수: <strong>${seed.avgScore100}점</strong>`;
      }
      function renderHistory() {
        const box = document.getElementById("review-history");
        const rows = readHistory();
        if (!rows.length) {
          box.innerHTML = "<p style='margin:0;color:#6b7280'>아직 작성한 후기가 없습니다.</p>";
          return;
        }
        box.innerHTML = rows
          .map(
            (r) => `
            <article class="history-item">
              <div style="font-size:13px;color:#6b7280">${r.createdAt}</div>
              <div style="font-weight:800">${r.name} · ${r.score}점</div>
              <p style="margin:6px 0 0;line-height:1.5">${r.content}</p>
            </article>
          `
          )
          .join("");
      }
      document.getElementById("review-form").addEventListener("submit", (event) => {
        event.preventDefault();
        const name = document.getElementById("review-name").value.trim();
        const score = document.getElementById("review-score").value;
        const content = document.getElementById("review-content").value.trim();
        const msg = document.getElementById("review-msg");
        if (!name || !content) {
          msg.textContent = "이름과 후기 내용을 입력해 주세요.";
          return;
        }
        const rows = readHistory();
        rows.unshift({
          name,
          score,
          content,
          createdAt: new Date().toLocaleString("ko-KR"),
        });
        localStorage.setItem("makeupReviewHistory", JSON.stringify(rows.slice(0, 20)));
        msg.textContent = "후기가 저장되었습니다.";
        event.target.reset();
        renderHistory();
      });
      renderSeed();
      renderHistory();
    </script>
  </body>
</html>
