<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>메이크업 미용사 · 오답노트</title>
    <link rel="stylesheet" href="../../assets/shared.css" />
    <style>
      body {
        margin: 0;
        background: #eef1f5;
      }
      .wrap {
        width: min(860px, calc(100% - 24px));
        margin: 0 auto;
        padding: 16px 0 28px;
      }
      .head {
        margin-bottom: 12px;
      }
      .head h1 {
        margin: 8px 0 4px;
        font-size: 1.35rem;
      }
      .meta {
        font-size: 13px;
        color: #667085;
      }
      .toolbar {
        display: grid;
        grid-template-columns: 1fr 180px;
        gap: 8px;
        margin-bottom: 10px;
      }
      .toolbar input,
      .toolbar select {
        width: 100%;
        border: 1px solid #d0d7e2;
        border-radius: 10px;
        min-height: 40px;
        padding: 0 10px;
        box-sizing: border-box;
      }
      .summary {
        display: grid;
        grid-template-columns: repeat(3, minmax(0, 1fr));
        gap: 8px;
        margin-bottom: 10px;
      }
      .summary-item {
        background: #fff;
        border: 1px solid #dde4ee;
        border-radius: 10px;
        padding: 10px;
      }
      .summary-item strong {
        display: block;
        font-size: 16px;
        margin-top: 3px;
      }
      .qa-panel {
        display: grid;
        gap: 8px;
        margin: 0 0 10px;
      }
      .qa-item {
        border: 1px solid #dde4ef;
        border-radius: 10px;
        padding: 8px 10px;
        background: #fff;
        display: flex;
        align-items: center;
        gap: 8px;
        font-size: 13px;
      }
      .qa-save-row {
        display: flex;
        justify-content: flex-end;
      }
      .qa-btn {
        border: 1px solid #c9d5ea;
        border-radius: 10px;
        background: #f8fbff;
        color: #30527f;
        min-height: 36px;
        padding: 0 12px;
        font-size: 13px;
        font-weight: 700;
        cursor: pointer;
      }
      .qa-msg {
        font-size: 12px;
        color: #475467;
        margin: 0 0 10px;
      }
      .list {
        display: grid;
        gap: 10px;
      }
      .item {
        background: #fff;
        border: 1px solid #e5e7eb;
        border-radius: 12px;
        padding: 12px;
      }
      .cat {
        color: #1353b3;
        font-size: 12px;
        font-weight: 800;
      }
      .q {
        margin: 8px 0;
        font-weight: 700;
        line-height: 1.45;
      }
      .a,
      .e {
        margin: 4px 0;
        font-size: 13px;
        color: #374151;
      }
      .empty {
        background: #fff;
        border: 1px dashed #cbd5e1;
        border-radius: 12px;
        padding: 18px;
      }
      .actions {
        display: flex;
        justify-content: flex-end;
        gap: 8px;
        margin-bottom: 10px;
      }
      .btn {
        border-radius: 10px;
        border: 1px solid #c9d5ea;
        background: #fff;
        color: #34507d;
        text-decoration: none;
        font-weight: 700;
        font-size: 13px;
        min-height: 38px;
        padding: 0 12px;
        display: inline-flex;
        align-items: center;
      }
      @media (max-width: 720px) {
        .toolbar {
          grid-template-columns: 1fr;
        }
        .summary {
          grid-template-columns: 1fr;
        }
      }
    </style>
  </head>
  <body>
    <div class="pm-shell">
      <header class="pm-header">
        <a class="pm-logo" href="../../index.html">PASSmaster</a>
        <nav class="pm-nav" aria-label="공통 이동">
          <a href="./index.html">문제은행</a>
          <a href="./review-share.html">후기작성/공유</a>
          <a href="../../my-courses/index.html">내 강의</a>
        </nav>
      </header>
      <main class="pm-main wrap">
        <div class="head">
          <p class="pm-pill">수강생 전용</p>
          <h1>오답노트</h1>
          <p class="meta" id="note-meta">저장된 오답 데이터를 불러오는 중...</p>
        </div>
        <div class="actions">
          <a class="btn" href="./index.html">문제은행으로 돌아가기</a>
          <a class="btn" href="./review-share.html">후기작성/공유</a>
        </div>
        <section class="summary" id="note-summary" hidden>
          <article class="summary-item">
            총 오답 문항
            <strong id="summary-total">0</strong>
          </article>
          <article class="summary-item">
            표시 중 문항
            <strong id="summary-visible">0</strong>
          </article>
          <article class="summary-item">
            과목 수
            <strong id="summary-cats">0</strong>
          </article>
        </section>
        <section class="toolbar" id="note-toolbar" hidden>
          <input id="note-search" type="search" placeholder="문항/해설 검색" />
          <select id="note-category-filter"></select>
        </section>
        <section class="qa-panel" id="qa-panel">
          <label class="qa-item"><input type="checkbox" data-qa-key="flowLockVerified" /> 회차 잠금/순차 진행 확인</label>
          <label class="qa-item"><input type="checkbox" data-qa-key="artifactSaved" /> 오답노트/통계 저장 확인</label>
          <label class="qa-item"><input type="checkbox" data-qa-key="reviewFlowVerified" /> 후기 작성/삭제 흐름 확인</label>
          <label class="qa-item"><input type="checkbox" data-qa-key="mobileLayoutVerified" /> 모바일 레이아웃 확인</label>
          <div class="qa-save-row">
            <button type="button" class="qa-btn" id="btn-qa-save">QA 체크 저장</button>
          </div>
          <p class="qa-msg" id="qa-msg"></p>
        </section>
        <section class="list" id="note-list"></section>
      </main>
      <footer class="pm-footer">
        <a href="../../index.html">메인으로</a>
        <a href="../../my-courses/index.html">내 강의</a>
        <a href="../../support/index.html">고객센터</a>
        <p style="margin:8px 0 0; font-size:12px; color:#667085;">
          패스마스터 · 정보관리자: 이태나 · 사업자등록번호: 326-58-00636 · 신한은행 이동길 110-623-996861
        </p>
      </footer>
    </div>
    <script>
      const DEFAULT_REMOTE_API_BASE = "https://passmaster-26-05.onrender.com/api";
      const isLocalHost =
        window.location.hostname === "localhost" || window.location.hostname === "127.0.0.1";
      const isGitHubPages = /\.github\.io$/i.test(window.location.hostname);
      function normalizeApiBase(raw) {
        if (raw == null || typeof raw !== "string") return null;
        let value = raw.trim().replace(/\/+$/, "");
        if (!value) return null;
        if (!value.endsWith("/api")) value = `${value}/api`;
        return value;
      }
      const API_BASE =
        normalizeApiBase(window.PASSMASTER_API_BASE) ||
        (isLocalHost ? "http://localhost:4000/api" : isGitHubPages ? DEFAULT_REMOTE_API_BASE : "/api");

      let originalRows = [];
      let qaChecklistState = {
        flowLockVerified: false,
        artifactSaved: false,
        reviewFlowVerified: false,
        mobileLayoutVerified: false,
      };

      function escapeHtml(value) {
        const div = document.createElement("div");
        div.textContent = value;
        return div.innerHTML;
      }

      function applyFilter() {
        const list = document.getElementById("note-list");
        const searchValue = document.getElementById("note-search").value.trim().toLowerCase();
        const selectedCat = document.getElementById("note-category-filter").value;
        const filtered = originalRows.filter((row) => {
          const cat = String(row.category || "기타");
          const question = String(row.question || "");
          const explanation = String(row.explanation || "");
          const catMatch = selectedCat === "all" ? true : cat === selectedCat;
          const textMatch =
            !searchValue ||
            question.toLowerCase().includes(searchValue) ||
            explanation.toLowerCase().includes(searchValue);
          return catMatch && textMatch;
        });
        document.getElementById("summary-visible").textContent = String(filtered.length);
        if (filtered.length === 0) {
          list.innerHTML = '<article class="empty">조건에 맞는 오답 문항이 없습니다.</article>';
          return;
        }
        list.innerHTML = filtered
          .map(
            (row) => `
              <article class="item">
                <div class="cat">${escapeHtml(row.category || "기타")}</div>
                <p class="q">${escapeHtml(row.question || "")}</p>
                <p class="a">정답: ${escapeHtml(String(row.answer || "-"))}</p>
                <p class="e">해설: ${escapeHtml(row.explanation || "해설 없음")}</p>
              </article>
            `
          )
          .join("");
      }

      function loadLocalQa() {
        try {
          const parsed = JSON.parse(localStorage.getItem("makeupQaChecklist") || "{}");
          if (parsed && typeof parsed === "object") {
            qaChecklistState = { ...qaChecklistState, ...parsed };
          }
        } catch (_error) {
          // ignore
        }
      }

      function renderQa() {
        loadLocalQa();
        document.querySelectorAll("[data-qa-key]").forEach((input) => {
          const key = input.getAttribute("data-qa-key");
          input.checked = Boolean(qaChecklistState[key]);
          input.addEventListener("change", () => {
            qaChecklistState[key] = Boolean(input.checked);
            localStorage.setItem("makeupQaChecklist", JSON.stringify(qaChecklistState));
          });
        });
      }

      async function saveQaRemote() {
        const qaMsg = document.getElementById("qa-msg");
        qaMsg.textContent = "저장 중...";
        try {
          const raw = localStorage.getItem("passmaster_auth");
          const session = raw ? JSON.parse(raw) : null;
          if (!session || !session.token) throw new Error("로그인이 필요합니다.");
          const wrongRows = JSON.parse(localStorage.getItem("makeupWrongNote") || "[]");
          const reviewSeed = JSON.parse(localStorage.getItem("makeupReviewSeed") || "{}");
          const res = await fetch(`${API_BASE}/me/study-artifact/makeup`, {
            method: "PUT",
            headers: {
              "Content-Type": "application/json",
              Authorization: `Bearer ${session.token}`,
            },
            body: JSON.stringify({
              payload: {
                wrongNotes: Array.isArray(wrongRows) ? wrongRows : [],
                reviewSeed: reviewSeed && typeof reviewSeed === "object" ? reviewSeed : {},
                qaChecklist: qaChecklistState,
              },
            }),
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok) throw new Error(data.message || "저장 실패");
          qaMsg.textContent = "QA 체크리스트가 저장되었습니다.";
        } catch (error) {
          qaMsg.textContent = `저장 실패: ${error.message || error}`;
        }
      }

      function renderWrongNote() {
        const meta = document.getElementById("note-meta");
        const list = document.getElementById("note-list");
        let rows = [];
        try {
          rows = JSON.parse(localStorage.getItem("makeupWrongNote") || "[]");
        } catch (_error) {
          rows = [];
        }
        if (!Array.isArray(rows) || rows.length === 0) {
          meta.textContent = "아직 저장된 오답이 없습니다.";
          list.innerHTML =
            '<article class="empty">학습/기출을 진행한 뒤 최종 요약에서 오답노트를 다시 확인해 주세요.</article>';
          return;
        }
        originalRows = rows;
        const categories = Array.from(new Set(rows.map((r) => String(r.category || "기타")))).sort();
        meta.textContent = `총 ${rows.length}문항의 오답이 저장되었습니다.`;
        document.getElementById("note-summary").hidden = false;
        document.getElementById("note-toolbar").hidden = false;
        document.getElementById("summary-total").textContent = String(rows.length);
        document.getElementById("summary-cats").textContent = String(categories.length);
        const categoryFilter = document.getElementById("note-category-filter");
        categoryFilter.innerHTML = `<option value="all">전체 과목</option>${categories
          .map((cat) => `<option value="${escapeHtml(cat)}">${escapeHtml(cat)}</option>`)
          .join("")}`;
        document.getElementById("note-search").addEventListener("input", applyFilter);
        categoryFilter.addEventListener("change", applyFilter);
        applyFilter();
      }
      async function hydrateRemoteArtifact() {
        try {
          const raw = localStorage.getItem("passmaster_auth");
          const session = raw ? JSON.parse(raw) : null;
          if (!session || !session.token) return;
          const res = await fetch(`${API_BASE}/me/study-artifact/makeup`, {
            headers: { Authorization: `Bearer ${session.token}` },
          });
          const data = await res.json().catch(() => ({}));
          if (!res.ok || !data || !data.payload) return;
          if (Array.isArray(data.payload.wrongNotes)) {
            localStorage.setItem("makeupWrongNote", JSON.stringify(data.payload.wrongNotes));
          }
          if (data.payload.reviewSeed && typeof data.payload.reviewSeed === "object") {
            localStorage.setItem("makeupReviewSeed", JSON.stringify(data.payload.reviewSeed));
          }
          if (data.payload.qaChecklist && typeof data.payload.qaChecklist === "object") {
            localStorage.setItem("makeupQaChecklist", JSON.stringify(data.payload.qaChecklist));
          }
        } catch (_error) {
          // 네트워크 실패 시 로컬 데이터로 계속 진행
        }
      }
      document.getElementById("btn-qa-save").addEventListener("click", saveQaRemote);
      renderQa();
      hydrateRemoteArtifact().finally(renderWrongNote);
    </script>
  </body>
</html>
