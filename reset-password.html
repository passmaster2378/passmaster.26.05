<!doctype html>
<html lang="ko">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>PASSmaster | 비밀번호 재설정</title>
    <link rel="stylesheet" href="./assets/shared.css" />
    <script defer src="./assets/shared.js"></script>
  </head>
  <body>
    <div class="pm-shell">
      <header class="pm-header">
        <a class="pm-logo" href="./index.html">PASSmaster</a>
        <nav class="pm-nav" aria-label="공통 이동">
          <a href="./login.html">로그인</a>
          <a href="./register.html">회원가입</a>
          <a href="./enroll/index.html">수강신청</a>
          <a href="./my-courses/index.html">내 강의</a>
          <a href="./pages.html">전체 페이지</a>
        </nav>
      </header>

      <main class="pm-main">
        <p class="pm-pill">Member</p>
        <h1>비밀번호 재설정</h1>
        <p class="pm-summary">
          로그인한 회원만 이용할 수 있습니다. 현재 비밀번호 확인 후 새 비밀번호(8자 이상)를 입력합니다.
          계정: <strong data-pw-flow-email>—</strong>
        </p>

        <section class="pm-card">
          <h2>새 비밀번호 입력</h2>
          <form class="auth-form-grid" data-auth-form="password-change">
            <div>
              <label for="currentPassword">현재 비밀번호</label>
              <div class="pm-password-row">
                <input
                  id="currentPassword"
                  name="currentPassword"
                  type="password"
                  data-password-field
                  autocomplete="current-password"
                  placeholder="현재 비밀번호 입력"
                />
                <button type="button" class="pm-password-toggle" data-password-toggle aria-pressed="false">
                  표시
                </button>
              </div>
            </div>
            <div>
              <label for="newPassword">새 비밀번호</label>
              <div class="pm-password-row">
                <input
                  id="newPassword"
                  name="newPassword"
                  type="password"
                  data-password-field
                  minlength="8"
                  autocomplete="new-password"
                  placeholder="8자 이상 새 비밀번호"
                />
                <button type="button" class="pm-password-toggle" data-password-toggle aria-pressed="false">
                  표시
                </button>
              </div>
            </div>
            <div>
              <label for="newPasswordConfirm">새 비밀번호 확인</label>
              <div class="pm-password-row">
                <input
                  id="newPasswordConfirm"
                  name="newPasswordConfirm"
                  type="password"
                  data-password-field
                  minlength="8"
                  autocomplete="new-password"
                  placeholder="새 비밀번호 다시 입력"
                />
                <button type="button" class="pm-password-toggle" data-password-toggle aria-pressed="false">
                  표시
                </button>
              </div>
            </div>
            <button class="pm-btn pm-btn-primary" type="submit" data-auth-submit>비밀번호 저장</button>
            <p class="auth-message info" data-auth-message hidden></p>
          </form>
        </section>

        <section class="pm-card">
          <h2>현재 경로</h2>
          <p class="pm-route">/reset-password</p>
        </section>

        <div class="pm-cta-row" aria-label="페이지 이동">
          <a class="pm-btn pm-btn-ghost" href="./forgot-password.html">안내 다시 보기</a>
          <a class="pm-btn pm-btn-primary" href="./mypage/index.html">마이페이지</a>
        </div>
      </main>

      <footer class="pm-footer">
        <a href="./index.html">메인으로</a>
        <a href="./support/index.html">고객센터</a>
        <a href="./pages.html">사이트맵</a>
      </footer>
    </div>
    <script defer src="./assets/auth-client.js"></script>
  </body>
</html>
