  <head>

    <title>PASSmaster | 비밀번호 변경으로 이동</title>
    <meta name="robots" content="noindex" />

    <script>
      (function () {
        try {
          var qs = typeof location.search === "string" ? location.search : "";
          var h = typeof location.hash === "string" ? location.hash : "";
          location.replace("./mypage/password/index.html" + qs + h);
        } catch (_e) {
          location.replace("./mypage/password/index.html");
        }
      })();
    </script>
    <meta http-equiv="refresh" content="0; url=./mypage/password/index.html" />
  </head>
  <body>
    <p style="font-family: system-ui, sans-serif; padding: 2rem">
      로그인 후 이용하는 <strong>비밀번호 변경</strong> 화면으로 이동합니다.
      자동 이동이 되지 않으면 <a href="./mypage/password/index.html">여기를 눌러 주세요</a>.
    </p>
  </body>
</html>
